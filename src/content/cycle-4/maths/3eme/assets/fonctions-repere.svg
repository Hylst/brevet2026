<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; fill: #1e293b; }
      .label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; fill: #334155; }
      .math { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: bold; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .axis { stroke: #0f172a; stroke-width: 2; }
      .line-affine { stroke: #ef4444; stroke-width: 3; fill: none; }
      .line-linear { stroke: #3b82f6; stroke-width: 3; fill: none; }
      .point { fill: #1e293b; }
      .dashed { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 4,4; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Grid (10x10 units, center at 250, 200) -->
  <g transform="translate(250, 200)">
    <!-- Grid lines -->
    <g class="grid">
      <!-- Vertical -->
      <line x1="-150" y1="-150" x2="-150" y2="150" />
      <line x1="-100" y1="-150" x2="-100" y2="150" />
      <line x1="-50" y1="-150" x2="-50" y2="150" />
      <line x1="50" y1="-150" x2="50" y2="150" />
      <line x1="100" y1="-150" x2="100" y2="150" />
      <line x1="150" y1="-150" x2="150" y2="150" />
      <!-- Horizontal -->
      <line x1="-150" y1="-150" x2="150" y2="-150" />
      <line x1="-150" y1="-100" x2="150" y2="-100" />
      <line x1="-150" y1="-50" x2="150" y2="-50" />
      <line x1="-150" y1="50" x2="150" y2="50" />
      <line x1="-150" y1="100" x2="150" y2="100" />
      <line x1="-150" y1="150" x2="150" y2="150" />
    </g>

    <!-- Axes -->
    <line x1="-180" y1="0" x2="180" y2="0" class="axis" marker-end="url(#arrow)" />
    <line x1="0" y1="180" x2="0" y2="-180" class="axis" marker-end="url(#arrow)" />
    
    <!-- Origin -->
    <text x="-15" y="15" class="label">0</text>
    <text x="45" y="15" class="label">1</text>
    <text x="-15" y="-45" class="label">1</text>

    <!-- Axis Labels -->
    <text x="170" y="-10" class="label" text-anchor="end">x (Antécédents)</text>
    <text x="10" y="-170" class="label">y = f(x) (Images)</text>

    <!-- Linear Function: f(x) = 0.5x (Blue) -->
    <!-- Points: (-100, -50), (100, 50) -->
    <line x1="-150" y1="75" x2="150" y2="-75" class="line-linear" />
    
    <!-- Affine Function: g(x) = -x + 2 (Red) -->
    <!-- Points: (0, 100) [b=2], (100, 0) -->
    <line x1="-50" y1="150" x2="150" y2="-50" class="line-affine" />

    <!-- Reading an image/antecedent example -->
    <line x1="100" y1="0" x2="100" y2="-50" class="dashed" />
    <line x1="100" y1="-50" x2="0" y2="-50" class="dashed" />
    <circle cx="100" cy="-50" r="4" class="point" fill="#3b82f6" />
  </g>

  <!-- Legend & Explanations -->
  <rect x="480" y="50" width="280" height="280" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8" />
  
  <text x="495" y="80" class="title">Fonctions</text>
  
  <!-- Linear -->
  <line x1="495" y1="110" x2="525" y2="110" class="line-linear" />
  <text x="535" y="115" class="math" fill="#2563eb">f(x) = ax</text>
  <text x="495" y="140" class="label">Fonction Linéaire</text>
  <text x="495" y="160" font-family="Inter" font-size="12" fill="#475569">Passe toujours par l'origine (0;0).</text>
  <text x="495" y="175" font-family="Inter" font-size="12" fill="#475569">Modélise la proportionnalité.</text>

  <!-- Affine -->
  <line x1="495" y1="210" x2="525" y2="210" class="line-affine" />
  <text x="535" y="215" class="math" fill="#dc2626">g(x) = ax + b</text>
  <text x="495" y="240" class="label">Fonction Affine</text>
  <text x="495" y="260" font-family="Inter" font-size="12" fill="#475569">Ne passe pas par l'origine.</text>
  <text x="495" y="275" font-family="Inter" font-size="12" fill="#475569">b = ordonnée à l'origine (ici b=2).</text>
  <text x="495" y="290" font-family="Inter" font-size="12" fill="#475569">a = coefficient directeur (pente).</text>

</svg>
