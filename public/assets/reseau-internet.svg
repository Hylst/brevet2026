<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .router { fill: #1e293b; stroke: #3b82f6; stroke-width: 4; rx: 10; }
      .switch { fill: #334155; stroke: #94a3b8; stroke-width: 3; rx: 5; }
      .device { fill: #0f172a; stroke: #cbd5e1; stroke-width: 2; rx: 4; }
      .cable { stroke: #60a5fa; stroke-width: 3; fill: none; }
      .wifi { stroke: #10b981; stroke-width: 3; stroke-dasharray: 4,4; fill: none; }
      .internet { fill: url(#grad); stroke: #38bdf8; stroke-width: 2; }
      
      @keyframes blink {
        0%, 100% { fill: #22c55e; }
        50% { fill: #064e3b; }
      }
      .led { animation: blink 1s infinite alternate; }
      
      @keyframes data-flow {
        0% { stroke-dashoffset: 40; }
        100% { stroke-dashoffset: 0; }
      }
      .data { stroke: #fbbf24; stroke-width: 4; stroke-dasharray: 10,30; fill: none; animation: data-flow 1s linear infinite; }
      
      <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.2" />
        <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:0.8" />
      </linearGradient>
    </style>
  </defs>

  <rect width="800" height="400" class="bg" rx="20" />
  <text x="400" y="40" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="24" text-anchor="middle">Réseaux informatiques et Internet</text>

  <!-- LAN Zone -->
  <rect x="50" y="100" width="350" height="260" fill="#1e293b" opacity="0.3" rx="20"/>
  <text x="225" y="130" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle">Réseau Local (LAN)</text>

  <!-- Router (Box) -->
  <g transform="translate(225, 180)">
    <rect x="-40" y="-30" width="80" height="60" class="router" />
    <circle cx="-10" cy="-40" r="3" fill="#3b82f6" />
    <circle cx="10" cy="-40" r="3" fill="#3b82f6" />
    <path d="M -10 -40 L -20 -60 M 10 -40 L 20 -60" stroke="#3b82f6" stroke-width="2" fill="none"/> <!-- Antennas -->
    
    <text x="0" y="5" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Routeur</text>
    <text x="0" y="20" fill="#60a5fa" font-family="sans-serif" font-size="12" text-anchor="middle">(Box)</text>
    
    <!-- LEDs -->
    <circle cx="-20" cy="15" r="3" class="led" style="animation-delay: 0s;"/>
    <circle cx="-10" cy="15" r="3" class="led" style="animation-delay: 0.3s;"/>
    <circle cx="0" cy="15" r="3" class="led" style="animation-delay: 0.6s;"/>
  </g>

  <!-- Switch -->
  <g transform="translate(225, 280)">
    <rect x="-30" y="-15" width="60" height="30" class="switch"/>
    <text x="0" y="5" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">Switch</text>
  </g>

  <path d="M 225 210 L 225 265" class="cable" />

  <!-- Devices -->
  <g transform="translate(100, 330)">
    <rect x="-20" y="-15" width="40" height="30" class="device" />
    <rect x="-16" y="-11" width="32" height="22" fill="#3b82f6" opacity="0.5"/>
    <text x="0" y="30" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">PC 1</text>
  </g>
  <path d="M 120 315 L 195 295" class="cable" />

  <g transform="translate(350, 330)">
    <rect x="-20" y="-15" width="40" height="30" class="device" />
    <rect x="-16" y="-11" width="32" height="22" fill="#3b82f6" opacity="0.5"/>
    <text x="0" y="30" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">PC 2</text>
  </g>
  <path d="M 330 315 L 255 295" class="cable" />

  <g transform="translate(100, 220)">
    <rect x="-15" y="-20" width="30" height="40" class="device" />
    <text x="0" y="35" fill="#cbd5e1" font-family="sans-serif" font-size="12" text-anchor="middle">Mobile</text>
  </g>
  <path d="M 115 220 C 150 220, 150 180, 185 180" class="wifi" />

  <!-- WAN Zone (Internet) -->
  <g transform="translate(600, 200)">
    <!-- Cloud shape -->
    <path d="M -40 0 C -60 -20, -100 -20, -80 30 C -120 40, -100 80, -60 80 C -40 110, 40 110, 60 80 C 100 80, 120 40, 80 30 C 100 -20, 60 -20, 40 0 C 20 -40, -20 -40, -40 0" class="internet" />
    <text x="0" y="35" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="20" text-anchor="middle">Internet</text>
    <text x="0" y="55" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">(Réseau mondial)</text>

    <!-- DNS Server Box inside cloud area -->
    <rect x="60" y="-60" width="80" height="60" fill="#0f172a" stroke="#cbd5e1" stroke-width="2" rx="5"/>
    <text x="100" y="-30" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Serveur</text>
    <text x="100" y="-15" fill="#fbbf24" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">DNS</text>
  </g>

  <!-- Connection to Internet with Data Flow -->
  <path d="M 265 180 L 500 230" class="cable" />
  <path d="M 265 180 L 500 230" class="data" />

</svg>
