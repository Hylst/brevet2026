<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Le Monde Multipolaire (Aujourd'hui)</text>

  <text x="400" y="70" font-family="sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">Ne dépend plus d'une seule superpuissance, mais de plusieurs pôles d'influence.</text>

  <!-- World map abstract -->
  <rect x="100" y="100" width="600" height="250" fill="#0f172a" rx="10" />

  <!-- USA -->
  <circle cx="200" cy="180" r="40" fill="#3b82f6" opacity="0.8" />
  <text x="200" y="175" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">États-Unis</text>
  <text x="200" y="195" font-family="sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">Superpuissance globale</text>
  
  <path d="M 240 180 Q 300 150 400 170" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="4 4" />

  <!-- UE -->
  <circle cx="430" cy="150" r="30" fill="#eab308" opacity="0.8" />
  <text x="430" y="145" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">U.E.</text>
  <text x="430" y="165" font-family="sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Pôle économique</text>

  <!-- Chine -->
  <circle cx="600" cy="180" r="40" fill="#ef4444" opacity="0.8" />
  <text x="600" y="175" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Chine</text>
  <text x="600" y="195" font-family="sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">Puissance rivale</text>
  
  <path d="M 560 180 Q 500 200 450 170" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="4 4" />

  <!-- Russia -->
  <circle cx="550" cy="120" r="20" fill="#8b5cf6" opacity="0.8" />
  <text x="550" y="115" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">Russie</text>
  <text x="550" y="130" font-family="sans-serif" font-size="8" fill="#cbd5e1" text-anchor="middle">Pôle militaire</text>

  <!-- BRICS / Emergents (Brazil, India) -->
  <circle cx="250" cy="280" r="25" fill="#10b981" opacity="0.8" />
  <text x="250" y="275" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">Brésil</text>
  <text x="250" y="290" font-family="sans-serif" font-size="8" fill="#cbd5e1" text-anchor="middle">Émergent</text>

  <circle cx="550" cy="250" r="25" fill="#10b981" opacity="0.8" />
  <text x="550" y="245" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">Inde</text>
  <text x="550" y="260" font-family="sans-serif" font-size="8" fill="#cbd5e1" text-anchor="middle">Émergent</text>

  <!-- Connections / Networks -->
  <path d="M 230 255 Q 300 220 400 230" stroke="#10b981" stroke-width="1" fill="none" stroke-dasharray="2 2" />
  <path d="M 525 250 Q 480 200 440 180" stroke="#10b981" stroke-width="1" fill="none" stroke-dasharray="2 2" />

  <rect x="250" y="300" width="300" height="40" fill="#1e293b" opacity="0.8" rx="4" />
  <text x="400" y="325" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold" text-anchor="middle">Interdépendance mondiale (Mondialisation)</text>

</svg>
