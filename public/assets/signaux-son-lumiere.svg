<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Signaux : Son et Lumière</text>

  <!-- Le Son -->
  <rect x="50" y="80" width="330" height="280" fill="#334155" rx="8" />
  <text x="215" y="110" font-family="sans-serif" font-size="20" fill="#3b82f6" font-weight="bold" text-anchor="middle">LE SON</text>

  <path d="M 60 160 Q 85 120 110 160 T 160 160 T 210 160 T 260 160 T 310 160" stroke="#3b82f6" stroke-width="4" fill="none" />
  <path d="M 60 180 Q 85 100 110 180 T 160 180 T 210 180 T 260 180 T 310 180" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.5"/>

  <text x="215" y="240" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold" text-anchor="middle">Signal Mécanique</text>
  <text x="215" y="260" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Besoin d'un milieu (air, eau) pour se propager.</text>
  <text x="215" y="280" font-family="sans-serif" font-size="14" fill="#ef4444" font-weight="bold" text-anchor="middle">Ne traverse pas le vide.</text>
  <text x="215" y="320" font-family="sans-serif" font-size="16" fill="#10b981" font-weight="bold" text-anchor="middle">Vitesse = 340 m/s (dans l'air)</text>


  <!-- La Lumière -->
  <rect x="420" y="80" width="330" height="280" fill="#334155" rx="8" />
  <text x="585" y="110" font-family="sans-serif" font-size="20" fill="#eab308" font-weight="bold" text-anchor="middle">LA LUMIÈRE</text>

  <line x1="450" y1="160" x2="720" y2="160" stroke="#eab308" stroke-width="6" stroke-dasharray="20 10" />
  <polygon points="720,160 705,150 705,170" fill="#eab308" />

  <text x="585" y="240" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold" text-anchor="middle">Signal Électromagnétique</text>
  <text x="585" y="260" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Se propage en ligne droite.</text>
  <text x="585" y="280" font-family="sans-serif" font-size="14" fill="#10b981" font-weight="bold" text-anchor="middle">Traverse le vide (ex: Soleil -> Terre).</text>
  <text x="585" y="320" font-family="sans-serif" font-size="16" fill="#ef4444" font-weight="bold" text-anchor="middle">Vitesse = 300 000 km/s</text>


  <!-- Eclair vs Tonnerre -->
  <rect x="350" y="150" width="100" height="60" fill="#1e293b" rx="4" />
  <text x="400" y="170" font-family="sans-serif" font-size="12" fill="#f8fafc" font-style="italic" text-anchor="middle">L'éclair avant</text>
  <text x="400" y="185" font-family="sans-serif" font-size="12" fill="#f8fafc" font-style="italic" text-anchor="middle">le tonnerre !</text>
  <path d="M 380 200 L 420 200 L 370 230" fill="none" stroke="#eab308" stroke-width="2"/>
</svg>
