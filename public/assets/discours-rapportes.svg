<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Les Discours Rapportés</text>

  <!-- Direct -->
  <rect x="50" y="80" width="220" height="280" fill="#334155" rx="8" />
  <text x="160" y="115" font-family="sans-serif" font-size="20" fill="#3b82f6" font-weight="bold" text-anchor="middle">Discours Direct</text>
  
  <rect x="70" y="135" width="180" height="60" fill="#1e293b" rx="4" />
  <text x="160" y="160" font-family="sans-serif" font-size="14" fill="#f8fafc" font-style="italic" text-anchor="middle">Paul annonça :</text>
  <text x="160" y="180" font-family="sans-serif" font-size="14" fill="#eab308" font-style="italic" font-weight="bold" text-anchor="middle">« Je viendrai demain. »</text>
  
  <circle cx="70" cy="230" r="4" fill="#3b82f6" />
  <text x="85" y="235" font-family="sans-serif" font-size="12" fill="#cbd5e1">Verbe introducteur</text>
  
  <circle cx="70" cy="260" r="4" fill="#3b82f6" />
  <text x="85" y="265" font-family="sans-serif" font-size="12" fill="#cbd5e1">Ponctuation (: « »)</text>
  
  <circle cx="70" cy="290" r="4" fill="#3b82f6" />
  <text x="85" y="295" font-family="sans-serif" font-size="12" fill="#cbd5e1">Temps du dialogue</text>


  <!-- Indirect -->
  <rect x="290" y="80" width="220" height="280" fill="#334155" rx="8" />
  <text x="400" y="115" font-family="sans-serif" font-size="20" fill="#ef4444" font-weight="bold" text-anchor="middle">Discours Indirect</text>
  
  <rect x="310" y="135" width="180" height="60" fill="#1e293b" rx="4" />
  <text x="400" y="160" font-family="sans-serif" font-size="14" fill="#f8fafc" font-style="italic" text-anchor="middle">Paul annonça <tspan fill="#ef4444" font-weight="bold">qu'il</tspan></text>
  <text x="400" y="180" font-family="sans-serif" font-size="14" fill="#f8fafc" font-style="italic" text-anchor="middle"><tspan fill="#eab308" font-weight="bold">viendrait le lendemain.</tspan></text>
  
  <circle cx="310" cy="230" r="4" fill="#ef4444" />
  <text x="325" y="235" font-family="sans-serif" font-size="12" fill="#cbd5e1">Intégré à la phrase (subordonnée)</text>
  
  <circle cx="310" cy="260" r="4" fill="#ef4444" />
  <text x="325" y="265" font-family="sans-serif" font-size="12" fill="#cbd5e1">Aucune ponctuation spéciale</text>
  
  <circle cx="310" cy="290" r="4" fill="#ef4444" />
  <text x="325" y="295" font-family="sans-serif" font-size="12" fill="#cbd5e1">Changement (pronoms, temps...)</text>


  <!-- Indirect Libre -->
  <rect x="530" y="80" width="220" height="280" fill="#334155" rx="8" />
  <text x="640" y="115" font-family="sans-serif" font-size="18" fill="#10b981" font-weight="bold" text-anchor="middle">Discours Indirect Libre</text>
  
  <rect x="550" y="135" width="180" height="60" fill="#1e293b" rx="4" />
  <text x="640" y="160" font-family="sans-serif" font-size="14" fill="#f8fafc" font-style="italic" text-anchor="middle">Paul était décidé.</text>
  <text x="640" y="180" font-family="sans-serif" font-size="14" fill="#eab308" font-style="italic" font-weight="bold" text-anchor="middle">Il viendrait le lendemain !</text>
  
  <circle cx="550" cy="230" r="4" fill="#10b981" />
  <text x="565" y="235" font-family="sans-serif" font-size="12" fill="#cbd5e1">Souvent sans subordonnée</text>
  
  <circle cx="550" cy="260" r="4" fill="#10b981" />
  <text x="565" y="265" font-family="sans-serif" font-size="12" fill="#cbd5e1">Garde l'expressivité ( ! ? ) du direct</text>
  
  <circle cx="550" cy="290" r="4" fill="#10b981" />
  <text x="565" y="295" font-family="sans-serif" font-size="12" fill="#cbd5e1">Temps/Pronoms de l'indirect</text>

</svg>
