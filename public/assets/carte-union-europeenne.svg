<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="50" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">L'Union Européenne</text>

  <!-- EU Flag Background -->
  <rect x="250" y="80" width="300" height="200" fill="#003399" rx="10"/>
  
  <!-- Map representations (Abstract) -->
  <path d="M 350 150 Q 380 120 420 160 T 480 140 Q 500 180 460 220 T 360 240 Q 330 190 350 150 Z" fill="#0ea5e9" opacity="0.3" />

  <!-- 12 Stars (Approximate Circle) -->
  <g fill="#FFCC00" transform="translate(400, 180)">
    <circle cx="0" cy="-60" r="5" />
    <circle cx="30" cy="-52" r="5" />
    <circle cx="52" cy="-30" r="5" />
    <circle cx="60" cy="0" r="5" />
    <circle cx="52" cy="30" r="5" />
    <circle cx="30" cy="52" r="5" />
    <circle cx="0" cy="60" r="5" />
    <circle cx="-30" cy="52" r="5" />
    <circle cx="-52" cy="30" r="5" />
    <circle cx="-60" cy="0" r="5" />
    <circle cx="-52" cy="-30" r="5" />
    <circle cx="-30" cy="-52" r="5" />
  </g>
  
  <text x="400" y="320" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold" text-anchor="middle">Construction d'un espace de paix et de prospérité</text>
  <text x="400" y="345" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Marché commun, monnaie unique (Euro), libre circulation (Espace Schengen)</text>
</svg>
