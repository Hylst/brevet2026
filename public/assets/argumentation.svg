<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Le Texte Argumentatif</text>

  <!-- Thème -->
  <rect x="250" y="70" width="300" height="40" fill="#3b82f6" rx="8" />
  <text x="400" y="95" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">LE THÈME</text>
  <text x="560" y="95" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="start">Ce dont on parle (ex: L'écologie)</text>

  <line x1="400" y1="110" x2="400" y2="130" stroke="#cbd5e1" stroke-width="2" />

  <!-- Thèse -->
  <rect x="250" y="130" width="300" height="40" fill="#8b5cf6" rx="8" />
  <text x="400" y="155" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">LA THÈSE</text>
  <text x="560" y="155" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="start">L'opinion de l'auteur</text>

  <!-- Connectors from Thèse to Arguments -->
  <line x1="400" y1="170" x2="400" y2="210" stroke="#cbd5e1" stroke-width="2" />
  <line x1="150" y1="210" x2="650" y2="210" stroke="#cbd5e1" stroke-width="2" />
  
  <line x1="150" y1="210" x2="150" y2="230" stroke="#cbd5e1" stroke-width="2" />
  <line x1="400" y1="210" x2="400" y2="230" stroke="#cbd5e1" stroke-width="2" />
  <line x1="650" y1="210" x2="650" y2="230" stroke="#cbd5e1" stroke-width="2" />

  <!-- Arguments -->
  <rect x="50" y="230" width="200" height="40" fill="#10b981" rx="8" />
  <text x="150" y="255" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Argument 1</text>
  <text x="150" y="285" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Idée pour prouver la thèse</text>

  <rect x="300" y="230" width="200" height="40" fill="#10b981" rx="8" />
  <text x="400" y="255" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Argument 2</text>
  <text x="400" y="285" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Autre idée (Introduit par "De plus")</text>

  <rect x="550" y="230" width="200" height="40" fill="#10b981" rx="8" />
  <text x="650" y="255" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Contre-Argument</text>
  <text x="650" y="285" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Pour anticiper la thèse adverse</text>

  <!-- Connectors to Examples -->
  <line x1="150" y1="300" x2="150" y2="330" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4" />
  <line x1="400" y1="300" x2="400" y2="330" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4" />
  <line x1="650" y1="300" x2="650" y2="330" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Exemples -->
  <rect x="50" y="330" width="200" height="40" fill="#f59e0b" rx="8" />
  <text x="150" y="355" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Exemple concret</text>
  <text x="150" y="380" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Fait, chiffre, anecdote</text>

  <rect x="300" y="330" width="200" height="40" fill="#f59e0b" rx="8" />
  <text x="400" y="355" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Exemple concret</text>
  <text x="400" y="380" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Illustre l'argument 2</text>

  <rect x="550" y="330" width="200" height="40" fill="#f59e0b" rx="8" />
  <text x="650" y="355" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Réfutation</text>
  <text x="650" y="380" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Détruire ce contre-argument</text>

</svg>
