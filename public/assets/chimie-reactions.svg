<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      @keyframes float1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes float2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
      @keyframes react { 
        0% { opacity: 0; transform: scale(0.5); }
        50% { opacity: 1; transform: scale(1.2); }
        100% { opacity: 0; transform: scale(1.5); }
      }
      .bubble { fill: #fff; opacity: 0.6; animation: float1 3s ease-in-out infinite; }
      .bubble2 { fill: #fff; opacity: 0.4; animation: float2 2s ease-in-out infinite; }
      .reaction { fill: #facc15; animation: react 2s infinite; }
    </style>
  </defs>
  
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  
  <!-- Section Réactifs -->
  <g transform="translate(150, 200)">
    <!-- Molecule CH4 (Methane) -->
    <circle cx="0" cy="0" r="30" fill="#334155"/>
    <text x="0" y="5" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="20" text-anchor="middle">C</text>
    
    <circle cx="-35" cy="-35" r="15" fill="#f8fafc"/>
    <text x="-35" y="-30" fill="#000" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">H</text>
    
    <circle cx="35" cy="-35" r="15" fill="#f8fafc"/>
    <text x="35" y="-30" fill="#000" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">H</text>
    
    <circle cx="-35" cy="35" r="15" fill="#f8fafc"/>
    <text x="-35" y="40" fill="#000" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">H</text>
    
    <circle cx="35" cy="35" r="15" fill="#f8fafc"/>
    <text x="35" y="40" fill="#000" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">H</text>
    
    <text x="0" y="80" fill="#e2e8f0" font-family="sans-serif" font-weight="bold" font-size="24" text-anchor="middle">CH₄</text>
  </g>

  <!-- Plus Sign -->
  <text x="280" y="210" fill="#94a3b8" font-family="sans-serif" font-weight="bold" font-size="40" text-anchor="middle">+</text>

  <!-- Molecule O2 (Dioxygène) -->
  <g transform="translate(350, 200)">
    <circle cx="-15" cy="0" r="20" fill="#ef4444" class="bubble"/>
    <text x="-15" y="5" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">O</text>
    
    <circle cx="15" cy="0" r="20" fill="#ef4444" class="bubble"/>
    <text x="15" y="5" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">O</text>
    
    <text x="0" y="80" fill="#e2e8f0" font-family="sans-serif" font-weight="bold" font-size="24" text-anchor="middle">2 O₂</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(450, 200)">
    <path d="M 0 -10 L 40 -10 L 40 -25 L 70 0 L 40 25 L 40 10 L 0 10 Z" fill="#3b82f6"/>
    <circle cx="35" cy="0" r="20" class="reaction"/>
  </g>

  <!-- Section Produits -->
  <g transform="translate(620, 200)">
    <!-- Molecule CO2 -->
    <circle cx="0" cy="-40" r="25" fill="#334155"/>
    <text x="0" y="-35" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">C</text>
    
    <circle cx="-35" cy="-40" r="20" fill="#ef4444"/>
    <text x="-35" y="-35" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">O</text>
    
    <circle cx="35" cy="-40" r="20" fill="#ef4444"/>
    <text x="35" y="-35" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">O</text>

    <!-- Molecule H2O -->
    <g transform="translate(0, 40)" class="bubble2">
      <circle cx="0" cy="0" r="20" fill="#ef4444"/>
      <text x="0" y="5" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">O</text>
      
      <circle cx="-20" cy="-15" r="10" fill="#f8fafc"/>
      <text x="-20" y="-12" fill="#000" font-family="sans-serif" font-weight="bold" font-size="10" text-anchor="middle">H</text>

      <circle cx="20" cy="-15" r="10" fill="#f8fafc"/>
      <text x="20" y="-12" fill="#000" font-family="sans-serif" font-weight="bold" font-size="10" text-anchor="middle">H</text>
    </g>

    <text x="0" y="90" fill="#e2e8f0" font-family="sans-serif" font-weight="bold" font-size="24" text-anchor="middle">CO₂ + 2 H₂O</text>
  </g>
  
  <text x="250" y="360" fill="#94a3b8" font-family="sans-serif" font-size="20" text-anchor="middle">Réactifs disparus</text>
  <text x="620" y="360" fill="#94a3b8" font-family="sans-serif" font-size="20" text-anchor="middle">Produits formés</text>
  
  <text x="400" y="40" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="28" text-anchor="middle">La conservation de la matière (Lavoisier)</text>

</svg>
