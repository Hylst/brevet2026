<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1a202c" rx="20"/>
  
  <!-- Sun -->
  <circle cx="50" cy="200" r="80" fill="#f6e05e" />
  
  <!-- Orbits -->
  <ellipse cx="50" cy="200" rx="300" ry="150" fill="none" stroke="#4a5568" stroke-width="2" />
  <ellipse cx="50" cy="200" rx="500" ry="250" fill="none" stroke="#4a5568" stroke-width="2" />
  
  <!-- Planets -->
  <circle cx="350" cy="200" r="15" fill="#e53e3e" /> <!-- Mercury -->
  <circle cx="50" cy="450" r="25" fill="#d69e2e" /> <!-- Earth -->
  
  <text x="400" y="380" font-family="sans-serif" font-size="24" fill="#e2e8f0" text-anchor="middle">Système Solaire</text>
</svg>