<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      @keyframes dash {
        to { stroke-dashoffset: -100; }
      }
      .path-line { fill: none; stroke: #3b82f6; stroke-width: 4; stroke-dasharray: 10, 10; animation: dash 2s linear infinite; }
      .force-vector { fill: none; stroke: #ef4444; stroke-width: 6; marker-end: url(#arrow); }
      .speed-vector { fill: none; stroke: #10b981; stroke-width: 6; marker-end: url(#arrow-speed); }
    </style>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-speed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
    
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#0f172a" rx="20"/>
  
  <rect x="0" y="250" width="800" height="150" fill="url(#road)"/>
  
  <line x1="0" y1="260" x2="800" y2="260" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Car -->
  <g transform="translate(350, 150)">
    <!-- Body -->
    <path d="M -80 60 Q -60 20 -20 20 L 40 20 Q 80 20 100 60 L 110 90 L -90 90 Z" fill="#e2e8f0"/>
    <path d="M -60 60 Q -40 30 -20 30 L 30 30 Q 60 30 80 60 Z" fill="#94a3b8"/>
    
    <!-- Wheels -->
    <circle cx="-50" cy="90" r="20" fill="#1e293b" stroke="#cbd5e1" stroke-width="4"/>
    <circle cx="60" cy="90" r="20" fill="#1e293b" stroke="#cbd5e1" stroke-width="4"/>
    
    <!-- Center of gravity -->
    <circle cx="10" cy="65" r="5" fill="#facc15"/>
    
    <!-- Speed Vector -->
    <line x1="10" y1="65" x2="160" y2="65" class="speed-vector"/>
    <text x="180" y="70" fill="#10b981" font-family="sans-serif" font-weight="bold" font-size="20">Vitesse</text>
    
    <!-- Forces (Poids et Réaction) -->
    <line x1="10" y1="65" x2="10" y2="140" class="force-vector"/>
    <text x="20" y="145" fill="#ef4444" font-family="sans-serif" font-weight="bold" font-size="18">Poids (Gravité)</text>
    
    <line x1="-50" y1="110" x2="-50" y2="35" class="force-vector"/>
    <line x1="60" y1="110" x2="60" y2="35" class="force-vector"/>
    <text x="60" y="25" fill="#ef4444" font-family="sans-serif" font-weight="bold" font-size="14">Réaction du sol</text>
    
    <!-- Force de frottement -->
    <line x1="10" y1="65" x2="-80" y2="65" class="force-vector"/>
    <text x="-160" y="60" fill="#ef4444" font-family="sans-serif" font-weight="bold" font-size="14">Frottement air</text>
  </g>
  
  <text x="400" y="50" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="28" text-anchor="middle">Mouvement et Actions Mécaniques</text>
  
</svg>
