<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#2d3748" rx="20"/>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#2d3748" rx="20"/>
  
  <!-- Developper -->
  <text x="200" y="50" font-family="sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">Développer</text>
  <rect x="100" y="80" width="200" height="80" fill="none" stroke="#68d391" stroke-width="3" rx="8" />
  <text x="200" y="125" font-family="monospace" font-size="24" fill="white" text-anchor="middle">k(a+b) = ka + kb</text>
  
  <!-- Factoriser -->
  <text x="600" y="50" font-family="sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">Factoriser</text>
  <rect x="500" y="80" width="200" height="80" fill="none" stroke="#f6ad55" stroke-width="3" rx="8" />
  <text x="600" y="125" font-family="monospace" font-size="24" fill="white" text-anchor="middle">ka + kb = k(a+b)</text>

  <!-- Arrow -->
  <path d="M400 120 L 450 120 M 430 100 L 450 120 L 430 140" stroke="#a0aec0" stroke-width="4" fill="none" />
</svg>
</svg>