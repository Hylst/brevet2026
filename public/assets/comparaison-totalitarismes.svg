<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Régimes Totalitaires (Années 1930)</text>

  <g transform="translate(40, 80)">
    <!-- URSS Column -->
    <rect x="0" y="0" width="220" height="280" fill="#7f1d1d" rx="8" opacity="0.8" />
    <text x="110" y="30" font-family="sans-serif" font-size="20" fill="#fff" font-weight="bold" text-anchor="middle">URSS</text>
    <text x="110" y="55" font-family="sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Joseph Staline</text>
    
    <text x="110" y="100" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">Idéologie</text>
    <text x="110" y="120" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Communisme</text>
    <text x="110" y="135" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Lutte des classes</text>
    <text x="110" y="150" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Collectivisation</text>
    
    <rect x="25" y="210" width="170" height="40" fill="#1e293b" rx="4" opacity="0.6"/>
    <text x="110" y="235" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Police: NKVD</text>

    <!-- Point Commun (The intersection / common traits) -->
    <rect x="240" y="0" width="240" height="280" fill="#334155" rx="8" />
    <text x="360" y="30" font-family="sans-serif" font-size="18" fill="#eab308" font-weight="bold" text-anchor="middle">POINTS COMMUNS</text>
    
    <circle cx="280" cy="80" r="4" fill="#eab308" />
    <text x="295" y="85" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">Chef Unique (Culte)</text>
    
    <circle cx="280" cy="115" r="4" fill="#eab308" />
    <text x="295" y="120" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">Parti Unique</text>

    <circle cx="280" cy="150" r="4" fill="#eab308" />
    <text x="295" y="155" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">Embrigadement</text>
    <text x="295" y="170" font-family="sans-serif" font-size="11" fill="#94a3b8">(Jeunesses, Loisirs)</text>

    <circle cx="280" cy="205" r="4" fill="#eab308" />
    <text x="295" y="210" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">Propagande & Censure</text>

    <circle cx="280" cy="245" r="4" fill="#eab308" />
    <text x="295" y="250" font-family="sans-serif" font-size="14" fill="#ef4444" font-weight="bold">Terreur & Répression</text>


    <!-- Germany Column -->
    <rect x="500" y="0" width="220" height="280" fill="#171717" rx="8" />
    <text x="610" y="30" font-family="sans-serif" font-size="20" fill="#fff" font-weight="bold" text-anchor="middle">ALLEMAGNE</text>
    <text x="610" y="55" font-family="sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Adolf Hitler (Nazisme)</text>
    
    <text x="610" y="100" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">Idéologie</text>
    <text x="610" y="120" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Racisme & Antisémistisme</text>
    <text x="610" y="135" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Espace Vital</text>
    <text x="610" y="150" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Expansionnisme</text>

    <rect x="525" y="210" width="170" height="40" fill="#334155" rx="4" />
    <text x="610" y="235" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Police: Gestapo</text>
  </g>
</svg>
