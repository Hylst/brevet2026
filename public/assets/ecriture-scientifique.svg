<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">L'Écriture Scientifique</text>

  <rect x="100" y="80" width="600" height="100" fill="#334155" rx="8" />
  
  <!-- Formule -->
  <text x="250" y="145" font-family="sans-serif" font-size="48" fill="#3b82f6" font-weight="bold" text-anchor="middle">a</text>
  <text x="400" y="145" font-family="sans-serif" font-size="48" fill="#f8fafc" font-weight="bold" text-anchor="middle">×</text>
  <text x="500" y="145" font-family="sans-serif" font-size="48" fill="#10b981" font-weight="bold" text-anchor="middle">10</text>
  <text x="560" y="115" font-family="sans-serif" font-size="24" fill="#ef4444" font-weight="bold" text-anchor="middle">n</text>

  <path d="M 250 160 L 250 200" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4" fill="none" />
  <rect x="120" y="210" width="260" height="50" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="4" />
  <text x="250" y="235" font-family="sans-serif" font-size="14" fill="#60a5fa" font-weight="bold" text-anchor="middle">1 ≤ a < 10</text>
  <text x="250" y="255" font-family="sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Un seul chiffre non nul avant la virgule.</text>

  <path d="M 560 130 L 560 200" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4" fill="none" />
  <rect x="430" y="210" width="260" height="50" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="4" />
  <text x="560" y="235" font-family="sans-serif" font-size="14" fill="#f87171" font-weight="bold" text-anchor="middle">Puissance (Entier Relatif)</text>
  <text x="560" y="255" font-family="sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Positif (Grand) / Négatif (Petit)</text>

  <!-- Exemples -->
  <rect x="100" y="280" width="280" height="80" fill="#334155" rx="8" />
  <text x="240" y="305" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold" text-anchor="middle">Grands Nombres</text>
  <text x="120" y="335" font-family="sans-serif" font-size="20" fill="#34d399">45 000</text>
  <path d="M 205 330 L 235 330" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <text x="310" y="335" font-family="sans-serif" font-size="20" fill="#3b82f6">4,5 × 10<tspan dy="-10" font-size="14" fill="#ef4444">4</tspan></text>

  <rect x="420" y="280" width="280" height="80" fill="#334155" rx="8" />
  <text x="560" y="305" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold" text-anchor="middle">Petits Nombres</text>
  <text x="440" y="335" font-family="sans-serif" font-size="20" fill="#34d399">0,0073</text>
  <path d="M 525 330 L 555 330" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <text x="630" y="335" font-family="sans-serif" font-size="20" fill="#3b82f6">7,3 × 10<tspan dy="-10" font-size="14" fill="#ef4444">-3</tspan></text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1" />
    </marker>
  </defs>
</svg>
