<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes patrol {
        0% { transform: translateX(0); }
        50% { transform: translateX(80px); }
        100% { transform: translateX(0); }
      }
      @keyframes destroy {
        0% { transform: scale(1); opacity: 1; }
        90% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0); opacity: 0; }
      }
      @keyframes phagocytosis {
        0% { d: path("M 0 -30 C 20 -30, 30 -15, 30 0 C 30 20, 15 30, 0 30 C -15 30, -30 20, -30 0 C -30 -15, -20 -30, 0 -30"); }
        50% { d: path("M 0 -30 C 40 -30, 60 -15, 60 0 C 60 20, 15 30, 0 30 C -15 30, -30 20, -30 0 C -30 -15, -20 -30, 0 -30"); }
        100% { d: path("M 0 -30 C 20 -30, 30 -15, 30 0 C 30 20, 15 30, 0 30 C -15 30, -30 20, -30 0 C -30 -15, -20 -30, 0 -30"); }
      }
      .virus { animation: float 3s ease-in-out infinite, destroy 6s forwards; transform-origin: center; }
      .virus-core { fill: #ef4444; }
      .virus-spike { fill: #b91c1c; }
      .macrophage { fill: #e0e7ff; stroke: #818cf8; stroke-width: 3; animation: phagocytosis 6s forwards; }
      .macrophage-group { animation: patrol 6s forwards; }
      .antibody { stroke: #fbbf24; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .b-cell { fill: #fef08a; stroke: #eab308; stroke-width: 3; animation: pulse 2s infinite; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#0f172a" rx="20" />
  
  <text x="400" y="40" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="24" text-anchor="middle">Le Système Immunitaire en Action</text>

  <!-- Section 1 : Phagocytose -->
  <g transform="translate(200, 200)">
    <!-- Macrophage -->
    <g class="macrophage-group">
      <path class="macrophage" d="M 0 -30 C 20 -30, 30 -15, 30 0 C 30 20, 15 30, 0 30 C -15 30, -30 20, -30 0 C -30 -15, -20 -30, 0 -30"/>
      <circle cx="-5" cy="-5" r="8" fill="#4f46e5" opacity="0.8"/>
      <text x="0" y="55" fill="#818cf8" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Phagocyte</text>
    </g>

    <!-- Pathogen (Bacteria/Virus) -->
    <g class="virus" transform="translate(60, 0)">
      <!-- Spikes -->
      <line x1="0" y1="0" x2="0" y2="-20" class="virus-spike" stroke-width="4"/>
      <line x1="0" y1="0" x2="14" y2="-14" class="virus-spike" stroke-width="4"/>
      <line x1="0" y1="0" x2="20" y2="0" class="virus-spike" stroke-width="4"/>
      <line x1="0" y1="0" x2="14" y2="14" class="virus-spike" stroke-width="4"/>
      <line x1="0" y1="0" x2="0" y2="20" class="virus-spike" stroke-width="4"/>
      <line x1="0" y1="0" x2="-14" y2="14" class="virus-spike" stroke-width="4"/>
      <line x1="0" y1="0" x2="-20" y2="0" class="virus-spike" stroke-width="4"/>
      <line x1="0" y1="0" x2="-14" y2="-14" class="virus-spike" stroke-width="4"/>
      <circle cx="0" cy="0" r="12" class="virus-core"/>
      <text x="0" y="-30" fill="#ef4444" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Antigène</text>
    </g>
    
    <text x="0" y="120" fill="#cbd5e1" font-family="sans-serif" font-size="16" text-anchor="middle">1. Réaction rapide (Phagocytose)</text>
  </g>

  <!-- Section 2 : Anticorps -->
  <g transform="translate(600, 200)">
    <!-- Lymphocyte B -->
    <circle cx="0" cy="0" r="30" class="b-cell"/>
    <circle cx="0" cy="0" r="15" fill="#ca8a04" opacity="0.8"/>
    <text x="0" y="55" fill="#facc15" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Lymphocyte B</text>

    <!-- Antibodies being emitted -->
    <g style="animation: float 2s infinite">
      <!-- Antibody Y shape -->
      <path d="M -30 -30 L -40 -40 M -30 -30 L -20 -40 M -30 -30 L -30 -15" class="antibody"/>
    </g>
    <g style="animation: float 2.5s infinite">
      <path d="M 30 -30 L 40 -40 M 30 -30 L 20 -40 M 30 -30 L 30 -15" class="antibody"/>
    </g>
    <g style="animation: float 3s infinite">
      <path d="M -30 30 L -40 40 M -30 30 L -20 40 M -30 30 L -30 15" class="antibody"/>
    </g>

    <text x="0" y="120" fill="#cbd5e1" font-family="sans-serif" font-size="16" text-anchor="middle">2. Réaction lente (Anticorps)</text>
  </g>

  <!-- Divider -->
  <line x1="400" y1="100" x2="400" y2="350" stroke="#334155" stroke-width="2" stroke-dasharray="8,8" />

</svg>
