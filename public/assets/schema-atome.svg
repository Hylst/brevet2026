<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#2d3748" rx="20"/>
  
  <!-- Orbiting electrons -->
  <g stroke="#63b3ed" fill="none" stroke-width="2">
    <ellipse cx="400" cy="200" rx="150" ry="50" transform="rotate(30 400 200)" />
    <ellipse cx="400" cy="200" rx="150" ry="50" transform="rotate(150 400 200)" />
  </g>
  
  <!-- Nucleus -->
  <circle cx="400" cy="200" r="40" fill="#f56565" />
  <circle cx="385" cy="185" r="15" fill="#e2e8f0" />
  <circle cx="415" cy="215" r="15" fill="#e2e8f0" />
  
  <!-- Electrons -->
  <circle cx="400" cy="150" r="10" fill="#63b3ed" />
  <circle cx="400" cy="250" r="10" fill="#63b3ed" />
  
  <text x="400" y="350" font-family="sans-serif" font-size="24" fill="#e2e8f0" text-anchor="middle">Structure de l'Atome</text>
</svg>