<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Chaînes d'Information et d'Action</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1" />
    </marker>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Information Section (TOP) -->
  <text x="400" y="80" font-family="sans-serif" font-size="18" fill="#3b82f6" font-weight="bold" text-anchor="middle">CHAÎNE D'INFORMATION</text>
  <path d="M 50 120 L 750 120" stroke="#334155" stroke-width="60" stroke-linecap="round" />

  <rect x="150" y="100" width="120" height="40" fill="#3b82f6" rx="4" />
  <text x="210" y="125" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">ACQUÉRIR</text>
  <text x="210" y="155" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Capteurs)</text>

  <rect x="340" y="100" width="120" height="40" fill="#3b82f6" rx="4" />
  <text x="400" y="125" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">TRAITER</text>
  <text x="400" y="155" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Processeur, Carte)</text>

  <rect x="530" y="100" width="120" height="40" fill="#3b82f6" rx="4" />
  <text x="590" y="125" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">COMMUNIQUER</text>
  <text x="590" y="155" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Voyants, Câbles)</text>

  <path d="M 270 120 L 330 120" stroke="#f8fafc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 460 120 L 520 120" stroke="#f8fafc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- Link Info -> Action -->
  <path d="M 590 140 L 590 230" stroke="#3b82f6" stroke-width="4" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-down)"/>
  <text x="610" y="195" font-family="sans-serif" font-size="12" fill="#3b82f6" font-weight="bold">Ordres</text>


  <!-- Action Section (BOTTOM) -->
  <text x="400" y="220" font-family="sans-serif" font-size="18" fill="#ef4444" font-weight="bold" text-anchor="middle">CHAÎNE D'ACTION</text>
  <path d="M 50 260 L 750 260" stroke="#334155" stroke-width="60" stroke-linecap="round" />

  <rect x="70" y="240" width="120" height="40" fill="#ef4444" rx="4" />
  <text x="130" y="265" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">ALIMENTER</text>
  <text x="130" y="295" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Pile, Secteur)</text>

  <rect x="230" y="240" width="120" height="40" fill="#ef4444" rx="4" />
  <text x="290" y="265" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">DISTRIBUER</text>
  <text x="290" y="295" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Bouton, Interrupteur)</text>

  <rect x="390" y="240" width="120" height="40" fill="#ef4444" rx="4" />
  <text x="450" y="265" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">CONVERTIR</text>
  <text x="450" y="295" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Moteur, Lampe)</text>

  <rect x="550" y="240" width="120" height="40" fill="#ef4444" rx="4" />
  <text x="610" y="265" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">TRANSMETTRE</text>
  <text x="610" y="295" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Engrenages, Roues)</text>

  <path d="M 190 260 L 220 260" stroke="#f8fafc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 350 260 L 380 260" stroke="#f8fafc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 510 260 L 540 260" stroke="#f8fafc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- Output -->
  <path d="M 670 260 L 730 260" stroke="#eab308" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="730" y="240" font-family="sans-serif" font-size="14" fill="#eab308" font-weight="bold">Action !</text>
  <text x="730" y="280" font-family="sans-serif" font-size="11" fill="#94a3b8">(Mouvement, etc.)</text>

</svg>
