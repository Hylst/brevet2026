<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="50" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Chaîne de Conversion d'Énergie</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Source -->
  <rect x="50" y="160" width="160" height="80" fill="#3b82f6" rx="8" />
  <text x="130" y="195" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Source d'Énergie</text>
  <text x="130" y="215" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">(ex: Eau, Vent, Uranium)</text>

  <!-- Converter -->
  <circle cx="400" cy="200" r="70" fill="#eab308" />
  <text x="400" y="195" font-family="sans-serif" font-size="16" fill="#1e293b" font-weight="bold" text-anchor="middle">Convertisseur</text>
  <text x="400" y="215" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">(ex: Alternateur)</text>

  <!-- Useful Energy -->
  <rect x="590" y="120" width="160" height="60" fill="#22c55e" rx="8" />
  <text x="670" y="145" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Énergie Utile</text>
  <text x="670" y="165" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">(ex: Électrique)</text>

  <!-- Dissipated Energy -->
  <rect x="590" y="240" width="160" height="60" fill="#ef4444" rx="8" />
  <text x="670" y="265" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Énergie Dissipée</text>
  <text x="670" y="285" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">(ex: Thermique / Chaleur)</text>

  <!-- Arrows -->
  <path d="M 210 200 L 320 200" stroke="#cbd5e1" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <text x="265" y="190" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Énergie d'entrée</text>

  <path d="M 465 170 L 580 150" stroke="#cbd5e1" stroke-width="6" fill="none" marker-end="url(#arrow)"/>

  <path d="M 465 230 L 580 260" stroke="#ef4444" stroke-width="6" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-red)"/>
  <text x="520" y="280" font-family="sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" transform="rotate(15, 520, 280)">Pertes</text>

  <text x="400" y="360" font-family="sans-serif" font-size="18" fill="#f8fafc" font-style="italic" text-anchor="middle">L'énergie ne se crée ni ne se perd : elle se transforme.</text>

</svg>
