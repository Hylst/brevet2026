<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Valeurs des Temps du Récit</text>

  <!-- Ligne de temps -->
  <path d="M 50 150 L 750 150" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" fill="none" />
  
  <text x="750" y="130" font-family="sans-serif" font-size="16" fill="#cbd5e1" font-weight="bold" text-anchor="end">Temps / Chronologie</text>

  <!-- L'Imparfait -->
  <rect x="50" y="80" width="300" height="40" fill="#3b82f6" opacity="0.4" rx="8" />
  <rect x="100" y="200" width="220" height="150" fill="#334155" rx="8" />
  <rect x="100" y="200" width="220" height="40" fill="#3b82f6" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="210" y="225" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">L'IMPARFAIT</text>

  <text x="210" y="260" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Arrière-plan, décors, description.</text>
  <text x="210" y="280" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Actions non limitées dans le temps.</text>
  <text x="210" y="300" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Habitude / Répétition.</text>
  <text x="210" y="330" font-family="sans-serif" font-size="12" fill="#f8fafc" font-style="italic" text-anchor="middle">"Le soleil brillait, il lisait tous les jours."</text>

  <path d="M 210 200 L 210 160" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4" fill="none" />

  <!-- Passé Simple -->
  <circle cx="450" cy="150" r="8" fill="#ef4444" />
  <circle cx="550" cy="150" r="8" fill="#ef4444" />
  <path d="M 500 200 L 500 160" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4" fill="none" />

  <rect x="390" y="200" width="220" height="150" fill="#334155" rx="8" />
  <rect x="390" y="200" width="220" height="40" fill="#ef4444" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="500" y="225" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">LE PASSÉ SIMPLE</text>

  <text x="500" y="260" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Premier plan, actions soudaines.</text>
  <text x="500" y="280" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Actions limitées, achevées.</text>
  <text x="500" y="300" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Succession d'actions.</text>
  <text x="500" y="330" font-family="sans-serif" font-size="12" fill="#f8fafc" font-style="italic" text-anchor="middle">"Soudain, la porte claqua."</text>


  <!-- Plus que parfait -->
  <path d="M 200 130 Q 150 100 100 130" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="200" y="60" width="160" height="50" fill="#1e293b" rx="4" />
  <text x="280" y="80" font-family="sans-serif" font-size="14" fill="#10b981" font-weight="bold" text-anchor="middle">Antériorité</text>
  <text x="280" y="95" font-family="sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Plus-que-parfait</text>


  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

</svg>
