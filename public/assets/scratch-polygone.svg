<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Algorithmique : Tracer un polygone régulier</text>

  <!-- Bloc principal -->
  <rect x="50" y="80" width="300" height="280" fill="#334155" rx="8" />
  
  <path d="M 70 100 Q 120 100 120 80 Q 120 120 170 120 L 330 120 L 330 150 L 70 150 Z" fill="#f59e0b" />
  <text x="130" y="135" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Quand drapeau cliqué</text>

  <rect x="70" y="150" width="260" height="30" fill="#0ea5e9" />
  <text x="80" y="170" font-family="sans-serif" font-size="14" fill="#fff">effacer tout</text>

  <rect x="70" y="180" width="260" height="30" fill="#0ea5e9" />
  <text x="80" y="200" font-family="sans-serif" font-size="14" fill="#fff">stylo en position d'écriture</text>

  <!-- Boucle -->
  <path d="M 70 210 L 330 210 L 330 240 L 100 240 L 100 310 L 330 310 L 330 340 L 70 340 Z" fill="#eab308" />
  <rect x="130" y="215" width="30" height="20" fill="#fff" rx="4" />
  <text x="80" y="230" font-family="sans-serif" font-size="14" fill="#000" font-weight="bold">répéter <tspan x="140" font-weight="normal">5</tspan> fois</text>

  <rect x="100" y="240" width="220" height="35" fill="#3b82f6" />
  <rect x="170" y="247" width="40" height="20" fill="#fff" rx="4" />
  <text x="110" y="262" font-family="sans-serif" font-size="14" fill="#fff">avancer de <tspan x="175" fill="#000">100</tspan> pas</text>

  <rect x="100" y="275" width="220" height="35" fill="#3b82f6" />
  <rect x="180" y="282" width="40" height="20" fill="#fff" rx="4" />
  <text x="110" y="297" font-family="sans-serif" font-size="14" fill="#fff">tourner     <tspan x="185" fill="#000">72</tspan> degrés</text>

  <!-- Explications de la formule -->
  <path d="M 360 292 L 400 292" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4" fill="none" />
  <rect x="420" y="200" width="330" height="140" fill="#334155" rx="8" stroke="#10b981" stroke-width="2"/>
  <text x="585" y="230" font-family="sans-serif" font-size="16" fill="#10b981" font-weight="bold" text-anchor="middle">Formule de l'Angle</text>
  
  <text x="585" y="260" font-family="sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Angle de rotation = 360° / n</text>
  <text x="585" y="280" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">(où n est le nombre de côtés)</text>

  <text x="585" y="315" font-family="sans-serif" font-size="14" fill="#34d399" font-weight="bold" text-anchor="middle">Ici pour un pentagone (5) : 360/5 = 72°</text>

  <!-- Illustration of Polygon -->
  <g transform="translate(585, 130) scale(0.6)">
    <polygon points="0,-85 80,-25 50,70 -50,70 -80,-25" fill="none" stroke="#3b82f6" stroke-width="4" />
    <path d="M 0 -85 A 30 30 0 0 1 20 -95" fill="none" stroke="#eab308" stroke-width="4" />
    <text x="35" y="-95" font-family="sans-serif" font-size="18" fill="#eab308" font-weight="bold">72°</text>
  </g>

</svg>
