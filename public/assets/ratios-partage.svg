<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Le Partage avec Ratios</text>

  <text x="400" y="70" font-family="sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle">Exemple : Partager <tspan fill="#eab308" font-weight="bold">100 €</tspan> selon le ratio <tspan fill="#3b82f6" font-weight="bold">2</tspan> : <tspan fill="#ef4444" font-weight="bold">3</tspan></text>

  <!-- Step 1: Total parts -->
  <rect x="50" y="100" width="200" height="150" fill="#334155" rx="8" />
  <text x="150" y="130" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">1. Nombre total de parts</text>
  
  <rect x="110" y="160" width="30" height="30" fill="#3b82f6" />
  <rect x="145" y="160" width="30" height="30" fill="#3b82f6" />
  <text x="185" y="180" font-family="sans-serif" font-size="20" fill="#fff">+</text>
  <rect x="210" y="160" width="30" height="30" fill="#ef4444" />
  <rect x="245" y="160" width="30" height="30" fill="#ef4444" />
  <rect x="280" y="160" width="30" height="30" fill="#ef4444" transform="translate(-160, 40)"/>
  <rect x="315" y="160" width="30" height="30" fill="#ef4444" transform="translate(-160, 40)"/>
  <rect x="350" y="160" width="30" height="30" fill="#ef4444" transform="translate(-160, 40)"/>
  <!-- Just showing blocks differently -->
  <g transform="translate(70, 160)">
    <rect x="0" y="0" width="20" height="20" fill="#3b82f6" rx="2" />
    <rect x="25" y="0" width="20" height="20" fill="#3b82f6" rx="2" />
    <text x="55" y="15" fill="#f8fafc" font-size="16">+</text>
    <rect x="70" y="0" width="20" height="20" fill="#ef4444" rx="2" />
    <rect x="95" y="0" width="20" height="20" fill="#ef4444" rx="2" />
    <rect x="120" y="0" width="20" height="20" fill="#ef4444" rx="2" />
  </g>

  <text x="150" y="220" font-family="sans-serif" font-size="20" fill="#f8fafc" font-weight="bold" text-anchor="middle">2 + 3 = <tspan fill="#10b981">5 parts</tspan></text>


  <!-- Step 2: Value of 1 part -->
  <rect x="300" y="100" width="200" height="150" fill="#334155" rx="8" />
  <text x="400" y="130" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">2. Valeur d'une part</text>

  <text x="400" y="170" font-family="sans-serif" font-size="20" fill="#f8fafc" font-weight="bold" text-anchor="middle"><tspan fill="#eab308">100 €</tspan> ÷ <tspan fill="#10b981">5 parts</tspan></text>
  <text x="400" y="210" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">=</text>
  <text x="400" y="240" font-family="sans-serif" font-size="20" fill="#f8fafc" font-weight="bold" text-anchor="middle"><tspan fill="#10b981">20 €</tspan> / part</text>

  <!-- Step 3: Distribution -->
  <rect x="550" y="100" width="200" height="150" fill="#334155" rx="8" />
  <text x="650" y="130" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">3. Distribution</text>

  <text x="650" y="170" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold" text-anchor="middle">Personne 1 (A)</text>
  <text x="650" y="190" font-family="sans-serif" font-size="16" fill="#3b82f6" font-weight="bold" text-anchor="middle">2 × 20 = 40 €</text>

  <text x="650" y="220" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold" text-anchor="middle">Personne 2 (B)</text>
  <text x="650" y="240" font-family="sans-serif" font-size="16" fill="#ef4444" font-weight="bold" text-anchor="middle">3 × 20 = 60 €</text>

</svg>
