<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      @keyframes swim {
        0% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(60px, -5px) rotate(5deg); }
        100% { transform: translate(120px, 0) rotate(0deg); }
      }
      @keyframes tail {
        0%, 100% { d: path("M 0 0 Q -20 10 -40 0 T -80 0"); }
        50% { d: path("M 0 0 Q -20 -10 -40 0 T -80 0"); }
      }
      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .ovule { fill: #fecdd3; stroke: #fb7185; stroke-width: 6; }
      .nucleus { fill: #f43f5e; opacity: 0.8; }
      .zone-pellucida { fill: none; stroke: #fda4af; stroke-width: 15; opacity: 0.5; stroke-dasharray: 10,10; }
      
      .spermatozoon { fill: #3b82f6; }
      .sperm-tail { fill: none; stroke: #3b82f6; stroke-width: 3; stroke-linecap: round; animation: tail 0.4s infinite linear; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#0f172a" rx="20" />
  <text x="400" y="40" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="24" text-anchor="middle">La Fécondation : Rencontre des Gamètes</text>

  <!-- Divider -->
  <line x1="400" y1="80" x2="400" y2="350" stroke="#334155" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Left Side: Gamete properties -->
  <g transform="translate(200, 210)">
    <circle cx="-80" cy="-60" r="30" class="ovule"/>
    <circle cx="-80" cy="-60" r="10" class="nucleus"/>
    <text x="-80" y="0" fill="#fb7185" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Ovule (Femelle)</text>
    <text x="-80" y="25" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">1 seule cellule géante</text>
    <text x="-80" y="45" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Immobile, contient des réserves</text>
    <text x="-80" y="65" fill="#fb7185" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">Noyau : 23 chromosomes</text>

    <!-- Spermatozoon representation -->
    <g transform="translate(80, -60)">
      <path d="M 0 0 C 15 -10, 25 0, 15 10 C 5 10, 0 5, 0 0" class="spermatozoon"/>
      <path d="M 0 0 Q -20 10 -40 0 T -80 0" class="sperm-tail"/>
    </g>
    <text x="80" y="0" fill="#3b82f6" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Spermatozoïde (Mâle)</text>
    <text x="80" y="25" fill="#f8fafc" font-family="sans-serif" font-size="12" text-anchor="middle">Microscopique</text>
    <text x="80" y="45" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Mobile (flagelle)</text>
    <text x="80" y="65" fill="#3b82f6" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">Noyau : 23 chromosomes</text>
  </g>

  <!-- Right Side: Fertilization Animation -->
  <g transform="translate(600, 220)">
    <!-- Oocyte -->
    <g style="animation: heartbeat 4s infinite">
      <circle cx="0" cy="0" r="90" class="zone-pellucida"/>
      <circle cx="0" cy="0" r="70" class="ovule"/>
      <circle cx="0" cy="0" r="25" class="nucleus"/>
    </g>
    
    <!-- Swarming Sperm -->
    <g transform="translate(-160, 20) scale(0.6)" style="animation: swim 2s infinite linear forwards">
      <circle cx="20" cy="0" r="4" fill="#3b82f6" opacity="0.5"/>
      <path d="M 0 0 C 15 -10, 25 0, 15 10 C 5 10, 0 5, 0 0" class="spermatozoon"/>
      <path d="M 0 0 Q -20 10 -40 0 T -80 0" class="sperm-tail"/>
    </g>
    <g transform="translate(-100, -70) scale(0.6) rotate(30)" style="animation: swim 3s infinite linear forwards">
      <path d="M 0 0 C 15 -10, 25 0, 15 10 C 5 10, 0 5, 0 0" class="spermatozoon"/>
      <path d="M 0 0 Q -20 10 -40 0 T -80 0" class="sperm-tail"/>
    </g>
    <!-- Winning sperm -->
    <g transform="translate(-80, 0) scale(0.6) rotate(0)">
      <path d="M 0 0 C 15 -10, 25 0, 15 10 C 5 10, 0 5, 0 0" class="spermatozoon"/>
      <path d="M 0 0 Q -20 10 -40 0 T -80 0" class="sperm-tail" style="animation-duration: 0.2s" />
    </g>

    <text x="0" y="140" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Cellule-Œuf</text>
    <text x="0" y="160" fill="#10b981" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">= 46 chromosomes (23x2)</text>
  </g>

</svg>
