  <line x1="250" y1="150" x2="250" y2="250" stroke="#cbd5e0" stroke-width="4" stroke-dasharray="10 10" />
  
  <text x="400" y="380" font-family="sans-serif" font-size="24" fill="#e2e8f0" text-anchor="middle">Cycle de l'eau</text>
