<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Le Pacte Autobiographique (Ph. Lejeune)</text>

  <!-- Triangle Identity -->
  <g transform="translate(400, 200)">
    <!-- Base triangle -->
    <path d="M 0 -80 L -120 100 L 120 100 Z" fill="#334155" stroke="#eab308" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Nodes -->
    <circle cx="0" cy="-80" r="30" fill="#3b82f6" />
    <text x="0" y="-75" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Auteur</text>

    <circle cx="-120" cy="100" r="30" fill="#ef4444" />
    <text x="-120" y="105" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Narrateur</text>

    <circle cx="120" cy="100" r="30" fill="#10b981" />
    <text x="120" y="105" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Personnage</text>

    <!-- Equal signs -->
    <text x="0" y="20" font-family="sans-serif" font-size="36" fill="#eab308" font-weight="bold" text-anchor="middle">=</text>
  </g>

  <!-- Explicit Conditions -->
  <rect x="50" y="80" width="220" height="150" fill="#1e293b" stroke="#cbd5e1" stroke-width="2" rx="8" />
  <text x="160" y="110" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold" text-anchor="middle">L'identité</text>
  <text x="160" y="140" font-family="sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Dans l'autobiographie,</text>
  <text x="160" y="165" font-family="sans-serif" font-size="14" fill="#3b82f6" font-weight="bold" text-anchor="middle">Auteur = Narrateur</text>
  <text x="160" y="185" font-family="sans-serif" font-size="14" fill="#10b981" font-weight="bold" text-anchor="middle">= Personnage principal</text>

  <!-- The contract -->
  <rect x="550" y="200" width="220" height="150" fill="#1e293b" stroke="#eab308" stroke-width="2" rx="8" stroke-dasharray="6 6"/>
  <text x="660" y="230" font-family="sans-serif" font-size="16" fill="#eab308" font-weight="bold" text-anchor="middle">L'engagement</text>
  <text x="660" y="260" font-family="sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">L'auteur s'engage à dire</text>
  <text x="660" y="280" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">la vérité</text>
  <text x="660" y="300" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">sur sa propre vie, avec</text>
  <text x="660" y="315" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">sincérité malgré les défauts.</text>
</svg>
