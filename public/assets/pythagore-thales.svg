<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#2d3748" rx="20"/>
  
  <!-- Pythagore -->
  <polygon points="100,300 300,300 100,150" fill="none" stroke="#68d391" stroke-width="3" />
  <text x="200" y="330" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle">Pythagore: a² + b² = c²</text>
  
  <!-- Thales -->
  <polygon points="500,300 700,300 600,150" fill="none" stroke="#f6ad55" stroke-width="3" />
  <line x1="550" y1="225" x2="650" y2="225" stroke="#f6ad55" stroke-width="2" />
  <text x="600" y="330" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle">Thalès: Proportions</text>
</svg>