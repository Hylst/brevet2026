<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Principales Figures de Style</text>

  <!-- Comparaison / Métaphore -->
  <rect x="50" y="70" width="330" height="130" fill="#334155" rx="8" />
  <circle cx="80" cy="135" r="20" fill="#3b82f6" />
  <text x="80" y="140" font-family="sans-serif" font-size="20" fill="#fff" text-anchor="middle">=</text>
  <text x="120" y="100" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold">Comparaison / Métaphore</text>
  <text x="120" y="130" font-family="sans-serif" font-size="14" fill="#94a3b8">Il est (fort comme) un lion.</text>
  <text x="120" y="150" font-family="sans-serif" font-size="14" fill="#cbd5e1">Rapprochement de deux éléments.</text>
  <text x="120" y="170" font-family="sans-serif" font-size="12" fill="#ef4444" font-weight="bold">Avec ou sans outil de comparaison.</text>

  <!-- Personnification -->
  <rect x="50" y="220" width="330" height="130" fill="#334155" rx="8" />
  <circle cx="80" cy="285" r="20" fill="#a855f7" />
  <text x="80" y="290" font-family="sans-serif" font-size="20" fill="#fff" text-anchor="middle">👤</text>
  <text x="120" y="250" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold">Personnification</text>
  <text x="120" y="280" font-family="sans-serif" font-size="14" fill="#94a3b8">Le vent hurlait dans les arbres.</text>
  <text x="120" y="300" font-family="sans-serif" font-size="14" fill="#cbd5e1">Donner des traits humains à</text>
  <text x="120" y="320" font-family="sans-serif" font-size="14" fill="#cbd5e1">un objet ou un animal.</text>

  <!-- Hyperbole -->
  <rect x="420" y="70" width="330" height="130" fill="#334155" rx="8" />
  <circle cx="450" cy="135" r="20" fill="#ef4444" />
  <text x="450" y="140" font-family="sans-serif" font-size="20" fill="#fff" text-anchor="middle">!</text>
  <text x="490" y="100" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold">Hyperbole</text>
  <text x="490" y="130" font-family="sans-serif" font-size="14" fill="#94a3b8">Je meurs de faim.</text>
  <text x="490" y="150" font-family="sans-serif" font-size="14" fill="#cbd5e1">Exagération forte pour mettre</text>
  <text x="490" y="170" font-family="sans-serif" font-size="14" fill="#cbd5e1">en valeur une idée ou un sentiment.</text>

  <!-- Antithèse -->
  <rect x="420" y="220" width="330" height="130" fill="#334155" rx="8" />
  <circle cx="450" cy="285" r="20" fill="#eab308" />
  <text x="450" y="290" font-family="sans-serif" font-size="20" fill="#fff" text-anchor="middle">↔</text>
  <text x="490" y="250" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold">Antithèse</text>
  <text x="490" y="280" font-family="sans-serif" font-size="14" fill="#94a3b8">Je vis, je meurs : je me brûle et me noie.</text>
  <text x="490" y="300" font-family="sans-serif" font-size="14" fill="#cbd5e1">Opposition de deux mots ou</text>
  <text x="490" y="320" font-family="sans-serif" font-size="14" fill="#cbd5e1">idées contraires.</text>
</svg>
