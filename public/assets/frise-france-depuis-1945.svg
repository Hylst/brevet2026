<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">La France depuis 1945</text>

  <!-- Main Timeline Axis -->
  <path d="M 50 180 L 750 180" stroke="#cbd5e1" stroke-width="4" />
  
  <polygon points="750,175 760,180 750,185" fill="#cbd5e1" />

  <!-- 1944-1946 (GPRF) -->
  <rect x="100" y="160" width="80" height="40" fill="#3b82f6" rx="4" />
  <text x="140" y="185" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">GPRF</text>
  <text x="140" y="220" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle" font-weight="bold">1944-1946</text>
  <text x="140" y="240" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Droit vote femmes</text>
  <text x="140" y="255" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Sécurité Sociale</text>

  <!-- 1946-1958 (IVe Rep) -->
  <rect x="200" y="160" width="120" height="40" fill="#8b5cf6" rx="4" />
  <text x="260" y="185" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">IVe Rép.</text>
  <text x="260" y="145" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle" font-weight="bold">1946 - 1958</text>
  <text x="260" y="125" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Décolonisation</text>
  <text x="260" y="110" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Guerre d'Algérie</text>
  <circle cx="200" cy="180" r="4" fill="#1e293b" />
  <circle cx="320" cy="180" r="4" fill="#1e293b" />

  <!-- 1958-Present (Ve Rep) -->
  <rect x="340" y="160" width="380" height="40" fill="#10b981" rx="4" />
  <text x="530" y="185" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Ve République (Depuis 1958)</text>
  
  <!-- Key Dates in Ve Rep -->
  <!-- 1958 -->
  <line x1="340" y1="160" x2="340" y2="220" stroke="#cbd5e1" stroke-width="2" />
  <text x="340" y="235" font-family="sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle" font-weight="bold">1958</text>
  <text x="340" y="250" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">C. De Gaulle</text>

  <!-- 1968 -->
  <line x1="420" y1="160" x2="420" y2="120" stroke="#cbd5e1" stroke-width="2" />
  <text x="420" y="110" font-family="sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Mai 1968</text>
  <text x="420" y="95" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Crise sociale</text>

  <!-- 1981 -->
  <line x1="520" y1="160" x2="520" y2="220" stroke="#cbd5e1" stroke-width="2" />
  <text x="520" y="235" font-family="sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle" font-weight="bold">1981</text>
  <text x="520" y="250" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Alternance</text>
  <text x="520" y="265" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">(F. Mitterrand)</text>

  <!-- 2000 -->
  <line x1="640" y1="160" x2="640" y2="120" stroke="#cbd5e1" stroke-width="2" />
  <text x="640" y="110" font-family="sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle" font-weight="bold">2000</text>
  <text x="640" y="95" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Quinquennat</text>

  <!-- Legend -->
  <g transform="translate(100, 320)" font-family="sans-serif" font-size="12" fill="#cbd5e1">
    <rect x="0" y="0" width="15" height="15" fill="#3b82f6" rx="2" />
    <text x="25" y="12">Gouvernement Provisoire de la Rép. Fr.</text>

    <rect x="300" y="0" width="15" height="15" fill="#8b5cf6" rx="2" />
    <text x="325" y="12">IVe République (Régime Assembiliaire)</text>

    <rect x="550" y="0" width="15" height="15" fill="#10b981" rx="2" />
    <text x="575" y="12">Ve République (Présidentielle)</text>
  </g>
</svg>
