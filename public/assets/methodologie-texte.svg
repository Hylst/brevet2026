<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Méthodologie : L'Essai / Le Texte Argumentatif</text>

  <!-- Step 1: Brouillon -->
  <rect x="50" y="80" width="200" height="250" fill="#334155" rx="8" />
  <rect x="50" y="80" width="200" height="40" fill="#f59e0b" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="150" y="105" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">1. Le Brouillon</text>
  
  <text x="70" y="150" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">• Analyser le sujet</text>
  <text x="80" y="170" font-family="sans-serif" font-size="12" fill="#cbd5e1">Mots-clés, thème</text>
  
  <text x="70" y="200" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">• Chercher des idées</text>
  <text x="80" y="220" font-family="sans-serif" font-size="12" fill="#cbd5e1">Arguments, exemples</text>
  
  <text x="70" y="250" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">• Faire un plan</text>
  <text x="80" y="270" font-family="sans-serif" font-size="12" fill="#cbd5e1">2 ou 3 grandes parties</text>

  <path d="M 260 200 L 290 200" stroke="#f8fafc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: Rédaction -->
  <rect x="300" y="80" width="200" height="250" fill="#334155" rx="8" />
  <rect x="300" y="80" width="200" height="40" fill="#3b82f6" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="400" y="105" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">2. La Rédaction</text>

  <rect x="320" y="130" width="160" height="40" fill="#1e293b" rx="4" />
  <text x="400" y="155" font-family="sans-serif" font-size="14" fill="#60a5fa" font-weight="bold" text-anchor="middle">Introduction</text>
  
  <rect x="320" y="180" width="160" height="80" fill="#1e293b" rx="4" />
  <text x="400" y="205" font-family="sans-serif" font-size="14" fill="#60a5fa" font-weight="bold" text-anchor="middle">Développement</text>
  <text x="400" y="225" font-family="sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">1 § = 1 idée + 1 exemple</text>
  <text x="400" y="245" font-family="sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Utiliser des connecteurs</text>

  <rect x="320" y="270" width="160" height="40" fill="#1e293b" rx="4" />
  <text x="400" y="295" font-family="sans-serif" font-size="14" fill="#60a5fa" font-weight="bold" text-anchor="middle">Conclusion</text>

  <path d="M 510 200 L 540 200" stroke="#f8fafc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: Relecture -->
  <rect x="550" y="80" width="200" height="250" fill="#334155" rx="8" />
  <rect x="550" y="80" width="200" height="40" fill="#10b981" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="650" y="105" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">3. La Relecture</text>

  <text x="570" y="150" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">• Orthographe</text>
  <text x="580" y="170" font-family="sans-serif" font-size="12" fill="#cbd5e1">Accords, Conjugaison</text>
  
  <text x="570" y="200" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">• Ponctuation</text>
  <text x="580" y="220" font-family="sans-serif" font-size="12" fill="#cbd5e1">Majuscules, points</text>
  
  <text x="570" y="250" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">• Sens</text>
  <text x="580" y="270" font-family="sans-serif" font-size="12" fill="#cbd5e1">Phrases compréhensibles</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8fafc" />
    </marker>
  </defs>

</svg>
