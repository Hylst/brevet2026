<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">La France défaite et occupée (1940-1944)</text>

  <!-- Map holder -->
  <g transform="translate(180, 70)">
    <!-- Zone libre (South) -->
    <path d="M 0 100 Q 150 150 250 80 L 250 210 L 0 210 Z" fill="#3b82f6" opacity="0.7" />
    <!-- Zone occupée (North) -->
    <path d="M 0 0 L 250 0 L 250 80 Q 150 150 0 100 Z" fill="#ef4444" opacity="0.6" />
    
    <!-- Ligne de démarcation -->
    <path d="M 0 100 Q 150 150 250 80" stroke="#f8fafc" stroke-width="4" stroke-dasharray="6 6" fill="none" />
    
    <!-- Cities -->
    <circle cx="130" cy="50" r="6" fill="#1e293b" stroke="#fff" stroke-width="2" />
    <text x="130" y="40" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Paris</text>
    
    <circle cx="160" cy="130" r="6" fill="#1e293b" stroke="#fff" stroke-width="2" />
    <text x="160" y="150" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Vichy</text>
  </g>

  <!-- Legend & Information -->
  <g transform="translate(480, 120)">
    <rect x="0" y="0" width="20" height="20" fill="#ef4444" opacity="0.6" />
    <text x="30" y="15" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold">Zone Occupée</text>
    <text x="30" y="32" font-family="sans-serif" font-size="12" fill="#cbd5e1">Administrée par l'Allemagne Nazie.</text>

    <line x1="0" y1="65" x2="20" y2="65" stroke="#f8fafc" stroke-width="4" stroke-dasharray="6 6" />
    <text x="30" y="70" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold">Ligne de démarcation</text>

    <rect x="0" y="100" width="20" height="20" fill="#3b82f6" opacity="0.7" />
    <text x="30" y="115" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold">Zone "Libre" (Sud)</text>
    <text x="30" y="135" font-family="sans-serif" font-size="12" fill="#cbd5e1">Régime de Vichy (Maréchal Pétain).</text>
    <text x="30" y="152" font-family="sans-serif" font-size="12" fill="#cbd5e1">Collaboration avec l'Allemagne.</text>
    <text x="30" y="169" font-family="sans-serif" font-size="12" fill="#cbd5e1">Envahie en Nov 1942.</text>
  </g>
</svg>
