<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" rx="20" />
  
  <g transform="translate(100, 200)">
    <!-- Osci Grid -->
    <g stroke="#334155" stroke-width="1">
      <!-- Horizontal lines -->
      <line x1="0" y1="-150" x2="600" y2="-150" stroke-dasharray="4 4" />
      <line x1="0" y1="-100" x2="600" y2="-100" stroke-dasharray="4 4" />
      <line x1="0" y1="-50" x2="600" y2="-50" stroke-dasharray="4 4" />
      <line x1="0" y1="50" x2="600" y2="50" stroke-dasharray="4 4" />
      <line x1="0" y1="100" x2="600" y2="100" stroke-dasharray="4 4" />
      <line x1="0" y1="150" x2="600" y2="150" stroke-dasharray="4 4" />

      <!-- Vertical lines -->
      <line x1="100" y1="-150" x2="100" y2="150" stroke-dasharray="4 4" />
      <line x1="200" y1="-150" x2="200" y2="150" stroke-dasharray="4 4" />
      <line x1="300" y1="-150" x2="300" y2="150" stroke-dasharray="4 4" />
      <line x1="400" y1="-150" x2="400" y2="150" stroke-dasharray="4 4" />
      <line x1="500" y1="-150" x2="500" y2="150" stroke-dasharray="4 4" />
    </g>

    <!-- Axes -->
    <line x1="-20" y1="0" x2="620" y2="0" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="0" y1="170" x2="0" y2="-170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
    
    <text x="610" y="-10" fill="#94a3b8" font-family="sans-serif" font-size="16">Temps (s)</text>
    <text x="10" y="-170" fill="#94a3b8" font-family="sans-serif" font-size="16">Tension (V)</text>

    <!-- Sinusoidal Wave -->
    <!-- Two periods. Period = 250px. Amplitude = 100px. -->
    <path d="M 0,0 
             C 50,-150 75,-100 125,0
             C 175,100 200,150 250,0
             C 300,-150 325,-100 375,0
             C 425,100 450,150 500,0
             C 550,-150 575,-100 600,-40" 
          fill="none" stroke="#22d3ee" stroke-width="4" filter="url(#glow)"/>
          
    <path d="M 0 0 C 45 -157 80 -157 125 0 C 170 157 205 157 250 0 C 295 -157 330 -157 375 0 C 420 157 455 157 500 0" 
          fill="none" stroke="#10b981" stroke-width="4" filter="url(#glow)"/>

    <!-- Annotations Umax -->
    <line x1="62" y1="0" x2="62" y2="-100" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="70" y="-50" fill="#f59e0b" font-family="sans-serif" font-size="18" font-weight="bold">U_max</text>

    <!-- Annotations Period T -->
    <line x1="0" y1="-120" x2="0" y2="-140" stroke="#a78bfa" stroke-width="2" />
    <line x1="250" y1="-120" x2="250" y2="-140" stroke="#a78bfa" stroke-width="2" />
    <line x1="0" y1="-130" x2="250" y2="-130" stroke="#a78bfa" stroke-width="2" marker-start="url(#arrow-rev)" marker-end="url(#arrow)" />
    <text x="110" y="-140" fill="#a78bfa" font-family="sans-serif" font-size="18" font-weight="bold">Période (T)</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-rev" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#a78bfa" />
    </marker>
  </defs>
</svg>
