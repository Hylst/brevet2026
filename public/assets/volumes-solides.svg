<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Volumes des Solides</text>

  <!-- 1 Base constante -->
  <rect x="50" y="80" width="330" height="140" fill="#334155" rx="8" />
  <rect x="50" y="80" width="330" height="30" fill="#3b82f6" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="215" y="100" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Solides Droits (Prisme, Cylindre)</text>
  
  <!-- Cylindre -->
  <g transform="translate(100, 160)">
    <ellipse cx="40" cy="-30" rx="20" ry="8" fill="#60a5fa" opacity="0.8" />
    <path d="M 20 -30 L 20 20 A 20 8 0 0 0 60 20 L 60 -30 Z" fill="#60a5fa" opacity="0.3" stroke="#60a5fa" stroke-width="2"/>
    <ellipse cx="40" cy="20" rx="20" ry="8" fill="#60a5fa" opacity="0.8" />
    <line x1="70" y1="-30" x2="70" y2="20" stroke="#cbd5e1" stroke-width="2" />
    <text x="80" y="0" font-family="sans-serif" font-size="12" fill="#cbd5e1">h</text>
    <text x="20" y="25" font-family="sans-serif" font-size="12" fill="#cbd5e1">Aire Base</text>
  </g>

  <rect x="210" y="140" width="150" height="40" fill="#1e293b" rx="4" />
  <text x="285" y="165" font-family="sans-serif" font-size="16" fill="#60a5fa" font-weight="bold" text-anchor="middle">V = Aire B × h</text>

  <!-- Pointe -->
  <rect x="50" y="240" width="330" height="140" fill="#334155" rx="8" />
  <rect x="50" y="240" width="330" height="30" fill="#10b981" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="215" y="260" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Solides en Pointe (Pyramide, Cône)</text>

  <!-- Cone -->
  <g transform="translate(100, 320)">
    <path d="M 20 20 A 20 8 0 0 0 60 20 A 20 8 0 0 0 20 20 Z" fill="#34d399" opacity="0.8" />
    <path d="M 20 20 L 40 -30 L 60 20" fill="#34d399" opacity="0.3" stroke="#34d399" stroke-width="2"/>
    <line x1="40" y1="-30" x2="40" y2="20" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2 2" />
    <line x1="70" y1="-30" x2="70" y2="20" stroke="#cbd5e1" stroke-width="2" />
    <text x="80" y="0" font-family="sans-serif" font-size="12" fill="#cbd5e1">h</text>
  </g>

  <rect x="210" y="300" width="150" height="40" fill="#1e293b" rx="4" />
  <text x="285" y="325" font-family="sans-serif" font-size="16" fill="#34d399" font-weight="bold" text-anchor="middle">V = (Aire B × h) / 3</text>


  <!-- Boule -->
  <rect x="420" y="80" width="330" height="300" fill="#334155" rx="8" />
  <rect x="420" y="80" width="330" height="30" fill="#f59e0b" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="585" y="100" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">La Boule</text>

  <g transform="translate(585, 200)">
    <circle cx="0" cy="0" r="50" fill="#fbbf24" opacity="0.4" stroke="#fbbf24" stroke-width="2" />
    <ellipse cx="0" cy="0" rx="50" ry="15" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="0" y1="0" x2="50" y2="0" stroke="#cbd5e1" stroke-width="2" />
    <circle cx="0" cy="0" r="3" fill="#cbd5e1" />
    <text x="25" y="-10" font-family="sans-serif" font-size="14" fill="#cbd5e1">R</text>
  </g>

  <rect x="490" y="280" width="190" height="70" fill="#1e293b" rx="4" />
  <text x="585" y="310" font-family="sans-serif" font-size="16" fill="#fbbf24" font-weight="bold" text-anchor="middle">V = 4/3 × π × R³</text>
  <text x="585" y="335" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Aire Surface = 4 × π × R²</text>

</svg>
