<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="50" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Logique de Programmation (Ex: Scratch)</text>

  <!-- Blocks area -->
  <g transform="translate(100, 100)">
    <!-- Event Block -->
    <path d="M 0 20 Q 20 0 40 20 L 250 20 L 250 50 L 50 50 L 40 60 L 30 50 L 0 50 Z" fill="#eab308" />
    <text x="15" y="40" font-family="sans-serif" font-size="16" fill="#1e293b" font-weight="bold">Quand le drapeau vert est cliqué</text>

    <!-- Loop Block start -->
    <path d="M 0 50 L 30 50 L 40 60 L 50 50 L 220 50 L 220 80 L 80 80 L 70 90 L 60 80 L 25 80 L 25 150 L 220 150 L 220 180 L 50 180 L 40 190 L 30 180 L 0 180 Z" fill="#f97316" />
    <text x="15" y="70" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold">Répéter 10 fois</text>

    <!-- Inside loop block -->
    <path d="M 25 80 L 60 80 L 70 90 L 80 80 L 200 80 L 200 110 L 80 110 L 70 120 L 60 110 L 25 110 Z" fill="#3b82f6" />
    <text x="40" y="100" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold">Avancer de 10 pas</text>

    <!-- Condition block -->
    <path d="M 25 110 L 60 110 L 70 120 L 80 110 L 200 110 L 200 140 L 80 140 L 70 150 L 60 140 L 25 140 Z" fill="#0ea5e9" />
    <text x="40" y="130" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold">Tourner de 90 degrés</text>
  </g>

  <!-- Explanation -->
  <g transform="translate(450, 120)" font-family="sans-serif" font-size="16" fill="#cbd5e1">
    <text x="0" y="0" font-weight="bold" fill="#eab308">Événement :</text>
    <text x="0" y="20">Déclenche l'exécution du programme.</text>

    <text x="0" y="60" font-weight="bold" fill="#f97316">Boucle (Répéter) :</text>
    <text x="0" y="80">Exécute une série d'instructions en boucle.</text>

    <text x="0" y="120" font-weight="bold" fill="#3b82f6">Mouvement :</text>
    <text x="0" y="140">Actions directes modifiant la position.</text>
    
    <text x="0" y="190" fill="#f8fafc" font-style="italic">L'emboîtement des blocs traduit</text>
    <text x="0" y="210" fill="#f8fafc" font-style="italic">l'ordre séquentiel des instructions.</text>
  </g>
</svg>
