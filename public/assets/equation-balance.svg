<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#2d3748" rx="20"/>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#2d3748" rx="20"/>

  <!-- Balance -->
  <path d="M200 300 H 600" stroke="#a0aec0" stroke-width="8" />
  <path d="M400 300 V 200" stroke="#a0aec0" stroke-width="8" />
  
  <!-- Scale Left -->
  <circle cx="200" cy="280" r="40" fill="#f56565" />
  <text x="200" y="280" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle" dominant-baseline="middle">x+2</text>

  <!-- Scale Right -->
  <circle cx="600" cy="280" r="40" fill="#68d391" />
  <text x="600" y="280" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle" dominant-baseline="middle">5</text>
  
  <text x="400" y="380" font-family="sans-serif" font-size="24" fill="#e2e8f0" text-anchor="middle">x + 2 = 5</text>
</svg>
</svg>