<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Institutions de la Ve République</text>

  <!-- Le Peuple -->
  <rect x="300" y="320" width="200" height="50" fill="#f59e0b" rx="25" />
  <text x="400" y="350" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold" text-anchor="middle">Le Peuple Français</text>
  <text x="400" y="385" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Suffrage universel direct</text>

  <!-- Président -->
  <rect x="150" y="70" width="200" height="60" fill="#3b82f6" rx="8" />
  <text x="250" y="100" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Président de la République</text>
  <text x="250" y="120" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Pouvoir Exécutif (Chef de l'État)</text>

  <!-- Gouvernement -->
  <rect x="150" y="200" width="200" height="60" fill="#0ea5e9" rx="8" />
  <text x="250" y="230" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Gouvernement (1er Ministre)</text>
  <text x="250" y="250" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Dirige la politique de la Nation</text>

  <!-- Parlement / AN -->
  <rect x="450" y="200" width="180" height="60" fill="#10b981" rx="8" />
  <text x="540" y="230" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Assemblée Nationale</text>
  <text x="540" y="250" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Les Députés</text>

  <!-- Parlement / Sénat -->
  <rect x="450" y="70" width="180" height="60" fill="#10b981" rx="8" />
  <text x="540" y="100" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Sénat</text>
  <text x="540" y="120" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Les Sénateurs</text>

  <rect x="440" y="60" width="200" height="210" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5 5" rx="10" />
  <text x="650" y="160" font-family="sans-serif" font-size="16" fill="#10b981" font-weight="bold" text-anchor="start" transform="rotate(-90, 650, 160)">PARLEMENT</text>
  <text x="670" y="160" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="start" transform="rotate(-90, 670, 160)">Pouvoir Législatif</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Peuple -> Président -->
  <path d="M 330 320 Q 250 220 250 140" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="210" y="275" font-family="sans-serif" font-size="12" fill="#f59e0b" font-weight="bold" transform="rotate(-30, 210, 275)">Élit (5 ans)</text>

  <!-- Peuple -> AN -->
  <path d="M 470 320 Q 540 280 540 270" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="560" y="300" font-family="sans-serif" font-size="12" fill="#f59e0b" font-weight="bold">Élit (5 ans)</text>

  <!-- Président -> Gouvernement -->
  <path d="M 250 130 L 250 190" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="260" y="165" font-family="sans-serif" font-size="12" fill="#94a3b8">Nomme</text>

  <!-- AN -> Gouvernement -->
  <path d="M 440 230 L 360 230" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="400" y="220" font-family="sans-serif" font-size="10" fill="#ef4444">Peut renverser</text>
  <text x="400" y="245" font-family="sans-serif" font-size="10" fill="#ef4444">(Censure)</text>

</svg>
