<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">La Phrase Complexe</text>

  <text x="400" y="70" font-family="sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Contient plusieurs verbes conjugués (une proposition = un verbe conjugué).</text>

  <!-- Juxtaposition -->
  <rect x="50" y="100" width="700" height="80" fill="#334155" rx="8" />
  <text x="70" y="130" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold">1. Juxtaposition</text>
  <text x="70" y="160" font-family="sans-serif" font-size="16" fill="#cbd5e1">Propositions séparées par un signe de ponctuation (, ; :)</text>
  <rect x="550" y="120" width="180" height="40" fill="#1e293b" rx="4" />
  <text x="640" y="145" font-family="sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Il lit, elle écrit.</text>

  <!-- Coordination -->
  <rect x="50" y="200" width="700" height="80" fill="#334155" rx="8" />
  <text x="70" y="230" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold">2. Coordination</text>
  <text x="70" y="260" font-family="sans-serif" font-size="16" fill="#cbd5e1">Relie par une conjonction de coordination (mais, ou, et, donc, or, ni, car)</text>
  <rect x="550" y="220" width="180" height="40" fill="#1e293b" rx="4" />
  <text x="640" y="245" font-family="sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Il lit <tspan fill="#3b82f6" font-weight="bold">et</tspan> elle écrit.</text>

  <!-- Subordination -->
  <rect x="50" y="300" width="700" height="80" fill="#334155" rx="8" />
  <text x="70" y="330" font-family="sans-serif" font-size="18" fill="#f8fafc" font-weight="bold">3. Subordination</text>
  <text x="70" y="360" font-family="sans-serif" font-size="16" fill="#cbd5e1">Proposition dépendante (subordonnée) reliée à une proposition principale.</text>
  <rect x="550" y="320" width="180" height="40" fill="#1e293b" rx="4" />
  <text x="640" y="345" font-family="sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Je pense <tspan fill="#ef4444" font-weight="bold">qu'</tspan>il pleut.</text>
</svg>
