<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">L'Épreuve de Rédaction (Brevet)</text>
  <text x="400" y="65" font-family="sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Vous avez le choix entre 2 sujets : Invention ou Réflexion.</text>

  <!-- Sujet d'Invention -->
  <rect x="50" y="100" width="330" height="260" fill="#334155" rx="8" />
  <rect x="50" y="100" width="330" height="40" fill="#8b5cf6" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="215" y="125" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold" text-anchor="middle">Sujet d'Invention</text>

  <text x="215" y="165" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold" text-anchor="middle">Raconter / Décrire / Imaginer</text>

  <text x="70" y="200" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Respecter les consignes :</text>
  <text x="90" y="220" font-family="sans-serif" font-size="12" fill="#94a3b8">Statut du narrateur (Je ou Il), temps des verbes.</text>

  <text x="70" y="250" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Forme libre mais structurée :</text>
  <text x="90" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">Dialogue, journal intime, suite de texte.</text>

  <text x="70" y="300" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Cohérence :</text>
  <text x="90" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">Rester dans le thème et l'époque du texte.</text>


  <!-- Sujet de Réflexion -->
  <rect x="420" y="100" width="330" height="260" fill="#334155" rx="8" />
  <rect x="420" y="100" width="330" height="40" fill="#f59e0b" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="585" y="125" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold" text-anchor="middle">Sujet de Réflexion</text>

  <text x="585" y="165" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold" text-anchor="middle">Argumenter / Convaincre</text>

  <text x="440" y="200" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Structure OBLIGATOIRE :</text>
  <text x="460" y="220" font-family="sans-serif" font-size="12" fill="#94a3b8">Introduction, Développement complet, Conclusion.</text>

  <text x="440" y="250" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Argumentation :</text>
  <text x="460" y="270" font-family="sans-serif" font-size="12" fill="#94a3b8">Présenter des ARGUMENTS, illustrés par des EXEMPLES.</text>

  <text x="440" y="300" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Connecteurs :</text>
  <text x="460" y="320" font-family="sans-serif" font-size="12" fill="#94a3b8">D'abord, ensuite, de plus, en effet, cependant...</text>

</svg>
