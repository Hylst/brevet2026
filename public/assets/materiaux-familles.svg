<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #1e293b; stroke: #334155; stroke-width: 3; rx: 15; }
      .title { font-family: sans-serif; font-weight: bold; font-size: 18px; text-anchor: middle; }
      .desc { font-family: sans-serif; font-size: 12px; text-anchor: middle; fill: #94a3b8; }
      
      .metal-shine { fill: #94a3b8; }
      .wood { fill: #8b5cf6; }  <!-- Abstract color for organic -->
      .glass { fill: #38bdf8; opacity: 0.8; }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .anim { animation: float 3s infinite ease-in-out; }
    </style>
  </defs>

  <rect width="800" height="400" class="bg" rx="20" />
  <text x="400" y="40" fill="#f8fafc" font-family="sans-serif" font-weight="bold" font-size="24" text-anchor="middle">Les Familles de Matériaux</text>

  <!-- 1. Metallic -->
  <g transform="translate(150, 200)">
    <rect x="-100" y="-120" width="200" height="240" class="panel" />
    <text x="0" y="-80" fill="#f8fafc" class="title">Métalliques</text>
    <text x="0" y="-60" class="desc">(Fer, Acier, Cuivre...)</text>
    
    <g transform="translate(0, 20)" class="anim" style="animation-delay: 0s;">
      <!-- Anvil/Gear shape -->
      <path d="M -30 -30 L 30 -30 L 30 0 L 20 0 L 20 30 L -20 30 L -20 0 L -30 0 Z" fill="#64748b" stroke="#cbd5e1" stroke-width="2"/>
    </g>
    
    <text x="0" y="80" fill="#10b981" font-weight="bold" font-size="12" font-family="sans-serif" text-anchor="middle">Conducteurs, Solides</text>
  </g>

  <!-- 2. Organic -->
  <g transform="translate(400, 200)">
    <rect x="-100" y="-120" width="200" height="240" class="panel" />
    <text x="0" y="-80" fill="#f8fafc" class="title">Organiques</text>
    <text x="0" y="-60" class="desc">(Bois, Cuir, Plastiques)</text>
    
    <g transform="translate(0, 20)" class="anim" style="animation-delay: 1s;">
      <!-- Leaf / Organic shape -->
      <path d="M 0 -40 C 40 -40, 40 40, 0 40 C -40 40, -40 -40, 0 -40" fill="#22c55e" stroke="#166534" stroke-width="2"/>
      <path d="M 0 40 L 0 -30" stroke="#166534" stroke-width="2" fill="none"/>
    </g>
    
    <text x="0" y="80" fill="#10b981" font-weight="bold" font-size="12" font-family="sans-serif" text-anchor="middle">Isolants, Légers</text>
  </g>

  <!-- 3. Ceramic/Mineral -->
  <g transform="translate(650, 200)">
    <rect x="-100" y="-120" width="200" height="240" class="panel" />
    <text x="0" y="-80" fill="#f8fafc" class="title">Céramiques</text>
    <text x="0" y="-60" class="desc">(Verre, Béton, Brique)</text>
    
    <g transform="translate(0, 20)" class="anim" style="animation-delay: 2s;">
      <!-- Brick/Glass shape -->
      <rect x="-25" y="-20" width="50" height="40" fill="#fb923c" stroke="#c2410c" stroke-width="2"/>
      <line x1="-25" y1="0" x2="25" y2="0" stroke="#c2410c" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="-20" stroke="#c2410c" stroke-width="2"/>
    </g>
    
    <text x="0" y="80" fill="#10b981" font-weight="bold" font-size="12" font-family="sans-serif" text-anchor="middle">Très durs, Fragiles</text>
  </g>

</svg>
