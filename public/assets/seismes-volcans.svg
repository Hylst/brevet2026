<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      @keyframes erupt {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        20% { transform: translateY(-50px) scale(1.5); opacity: 1; }
        80% { transform: translateY(-150px) scale(2.5); opacity: 0; }
        100% { transform: translateY(-150px) scale(2.5); opacity: 0; }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
        20%, 40%, 60%, 80% { transform: translateX(3px); }
      }
      .lava { fill: #ef4444; }
      .volcano { fill: #4b5563; }
      .earthquake { animation: shake 3s infinite; }
      .eruption1 { animation: erupt 3s infinite; transform-origin: center; }
      .eruption2 { animation: erupt 3s infinite 0.5s; transform-origin: center; }
      .eruption3 { animation: erupt 3s infinite 1s; transform-origin: center; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#1e293b" rx="20"/>

  <!-- Tectonics / Earthquake section -->
  <g class="earthquake">
    <!-- Earth layers -->
    <path d="M 50 350 L 350 350 L 300 200 L 100 200 Z" fill="#b45309"/>
    <path d="M 100 200 L 300 200 L 250 100 L 150 100 Z" fill="#d97706"/>
    
    <!-- Fault line -->
    <path d="M 230 100 L 190 200 L 210 280 L 150 350" stroke="#fef08a" stroke-width="4" fill="none" stroke-dasharray="10,5"/>
    
    <!-- Foyer / Epicenter -->
    <circle cx="190" cy="200" r="10" fill="#ef4444"/>
    <text x="130" y="205" fill="#fca5a5" font-family="sans-serif" font-weight="bold">Foyer</text>

    <circle cx="230" cy="100" r="8" fill="#fb923c"/>
    <text x="140" y="90" fill="#fca5a5" font-family="sans-serif" font-weight="bold">Épicentre</text>

    <!-- Seismic waves -->
    <circle cx="190" cy="200" r="30" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.8"/>
    <circle cx="190" cy="200" r="50" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.6"/>
    <circle cx="190" cy="200" r="70" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Volcano section -->
  <g transform="translate(450, 50)">
    <!-- Volcano base -->
    <path class="volcano" d="M 50 300 L 250 300 L 180 150 L 120 150 Z" />
    
    <!-- Magma chamber -->
    <circle cx="150" cy="280" r="30" class="lava"/>
    <path d="M 140 280 L 160 280 L 160 150 L 140 150 Z" class="lava"/>

    <!-- Lava flow -->
    <path d="M 120 150 L 150 160 L 100 220 L 80 220 Z" class="lava"/>
    <path d="M 180 150 L 160 160 L 200 240 L 220 230 Z" class="lava"/>

    <!-- Eruption particles -->
    <circle cx="150" cy="150" r="15" fill="#f97316" class="eruption1"/>
    <circle cx="130" cy="140" r="10" fill="#eab308" class="eruption2"/>
    <circle cx="170" cy="145" r="12" fill="#ef4444" class="eruption3"/>
    
    <!-- Ash cloud -->
    <path d="M 100 100 Q 150 50 200 100 Q 250 90 220 130 Q 150 150 80 120 Z" fill="#9ca3af" opacity="0.8" class="eruption1"/>

    <text x="150" y="320" fill="#cbd5e1" font-family="sans-serif" font-weight="bold" text-anchor="middle">Volcanisme</text>
  </g>
  
  <text x="200" y="380" fill="#cbd5e1" font-family="sans-serif" font-weight="bold" text-anchor="middle">Séisme (faille)</text>

</svg>
