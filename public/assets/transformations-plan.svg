<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">Les Transformations du Plan</text>

  <g transform="translate(150, 150) scale(0.8)">
    <!-- Symétrie Axiale -->
    <rect x="-100" y="-80" width="200" height="150" fill="#334155" rx="8" />
    <text x="0" y="-95" font-family="sans-serif" font-size="16" fill="#60a5fa" font-weight="bold" text-anchor="middle">Symétrie Axiale</text>
    <text x="0" y="90" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Effet "Miroir"</text>
    
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#f8fafc" stroke-width="2" stroke-dasharray="4 4" />
    <polygon points="-60,-10 -20,-10 -20,-50" fill="#ef4444" />
    <polygon points="60,-10 20,-10 20,-50" fill="#fca5a5" />
    <path d="M -40 -30 L 40 -30" stroke="#64748b" stroke-width="1" fill="none" />
  </g>

  <g transform="translate(400, 150) scale(0.8)">
    <!-- Symétrie Centrale -->
    <rect x="-100" y="-80" width="200" height="150" fill="#334155" rx="8" />
    <text x="0" y="-95" font-family="sans-serif" font-size="16" fill="#10b981" font-weight="bold" text-anchor="middle">Symétrie Centrale</text>
    <text x="0" y="90" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Demi-tour autour d'un point</text>
    
    <circle cx="0" cy="0" r="4" fill="#f8fafc" />
    <polygon points="-60,10 -20,10 -20,50" fill="#ef4444" />
    <polygon points="60,-10 20,-10 20,-50" fill="#6ee7b7" />
    <line x1="-20" y1="10" x2="20" y2="-10" stroke="#64748b" stroke-width="1" />
  </g>

  <g transform="translate(650, 150) scale(0.8)">
    <!-- Translation -->
    <rect x="-100" y="-80" width="200" height="150" fill="#334155" rx="8" />
    <text x="0" y="-95" font-family="sans-serif" font-size="16" fill="#f59e0b" font-weight="bold" text-anchor="middle">Translation</text>
    <text x="0" y="90" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Glissement (sans tourner)</text>
    
    <polygon points="-60,20 -20,20 -20,-20" fill="#ef4444" />
    <polygon points="10,-20 50,-20 50,-60" fill="#fcd34d" />
    <path d="M -20 20 L 50 -20" stroke="#f8fafc" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  </g>

  <g transform="translate(250, 310) scale(0.8)">
    <!-- Rotation -->
    <rect x="-100" y="-60" width="200" height="120" fill="#334155" rx="8" />
    <text x="0" y="-75" font-family="sans-serif" font-size="16" fill="#8b5cf6" font-weight="bold" text-anchor="middle">Rotation</text>
    
    <circle cx="-50" cy="30" r="4" fill="#f8fafc" />
    <polygon points="-80,0 -40,0 -40,-40" fill="#ef4444" />
    <!-- rotated approx 90 deg right around -50,30 -->
    <polygon points="-20,60 -20,20 20,20" fill="#c4b5fd" />
    <path d="M -40 -20 A 50 50 0 0 1 0 20" stroke="#f8fafc" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  </g>

  <g transform="translate(550, 310) scale(0.8)">
    <!-- Homothétie -->
    <rect x="-100" y="-60" width="200" height="120" fill="#334155" rx="8" />
    <text x="0" y="-75" font-family="sans-serif" font-size="16" fill="#ec4899" font-weight="bold" text-anchor="middle">Homothétie</text>
    
    <circle cx="-70" cy="40" r="4" fill="#f8fafc" />
    <polygon points="-40,20 -20,20 -20,0" fill="#ef4444" />
    <polygon points="-10,0 30,0 30,-40" fill="#f9a8d4" />
    <line x1="-70" y1="40" x2="30" y2="-40" stroke="#f8fafc" stroke-width="1" stroke-dasharray="2 2" />
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8fafc" />
    </marker>
  </defs>
</svg>
