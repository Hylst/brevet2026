<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">L'Utopie et la Dystopie</text>

  <!-- Utopie -->
  <rect x="50" y="100" width="330" height="260" fill="#334155" rx="8" />
  <path d="M 50 100 Q 215 60 380 100" fill="#10b981" />
  <rect x="50" y="100" width="330" height="40" fill="#10b981" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="215" y="125" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold" text-anchor="middle">L'UTOPIE</text>
  
  <text x="215" y="160" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-style="italic" text-anchor="middle">Du grec "ou-topos" : le lieu qui n'existe pas.</text>

  <text x="70" y="200" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold">Société Idéale :</text>
  <text x="90" y="230" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Bonheur pour tous.</text>
  <text x="90" y="260" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Égalité, justice, harmonie.</text>
  <text x="90" y="290" font-family="sans-serif" font-size="14" fill="#cbd5e1">• But : Critiquer la société actuelle.</text>
  
  <text x="70" y="330" font-family="sans-serif" font-size="12" fill="#34d399">Ex : "L'Utopie" de Thomas More.</text>


  <!-- Dystopie -->
  <rect x="420" y="100" width="330" height="260" fill="#334155" rx="8" />
  <rect x="420" y="100" width="330" height="40" fill="#ef4444" clip-path="inset(0 0 0 0 round 8px 8px 0 0)" />
  <text x="585" y="125" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold" text-anchor="middle">LA DYSTOPIE</text>

  <text x="585" y="160" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-style="italic" text-anchor="middle">Contre-utopie.</text>

  <text x="440" y="200" font-family="sans-serif" font-size="16" fill="#f8fafc" font-weight="bold">Société de Cauchemar :</text>
  <text x="460" y="230" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Privation de liberté, dictature.</text>
  <text x="460" y="260" font-family="sans-serif" font-size="14" fill="#cbd5e1">• Surveillance constante (technologie).</text>
  <text x="460" y="290" font-family="sans-serif" font-size="14" fill="#cbd5e1">• But : Mettre en garde sur l'avenir.</text>
  
  <text x="440" y="330" font-family="sans-serif" font-size="12" fill="#f87171">Ex : "1984" de G. Orwell / Hunger Games.</text>

</svg>
