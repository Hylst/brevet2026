<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">L'Engagement Citoyen</text>

  <!-- Central Element (Le Citoyen) -->
  <circle cx="400" cy="200" r="60" fill="#3b82f6" />
  <text x="400" y="195" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold" text-anchor="middle">LE</text>
  <text x="400" y="215" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold" text-anchor="middle">CITOYEN</text>

  <!-- Links out -->
  <line x1="400" y1="140" x2="400" y2="80" stroke="#cbd5e1" stroke-width="3" />
  <line x1="400" y1="260" x2="400" y2="320" stroke="#cbd5e1" stroke-width="3" />
  <line x1="340" y1="200" x2="250" y2="200" stroke="#cbd5e1" stroke-width="3" />
  <line x1="460" y1="200" x2="550" y2="200" stroke="#cbd5e1" stroke-width="3" />
  <line x1="358" y1="158" x2="280" y2="120" stroke="#cbd5e1" stroke-width="3" />
  <line x1="442" y1="158" x2="520" y2="120" stroke="#cbd5e1" stroke-width="3" />

  <!-- Politique -->
  <rect x="300" y="40" width="200" height="40" fill="#ef4444" rx="8" />
  <text x="400" y="65" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Engagement Politique</text>
  <text x="400" y="30" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Voter, Être Élu, Parti Politique</text>

  <!-- Militaire / Défense -->
  <rect x="520" y="90" width="200" height="40" fill="#10b981" rx="8" />
  <text x="620" y="115" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Engagement Défense</text>
  <text x="620" y="145" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">JDC, Service Civique, Armée</text>

  <!-- Associations -->
  <rect x="550" y="180" width="200" height="40" fill="#8b5cf6" rx="8" />
  <text x="650" y="205" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Engagement Associatif</text>
  <text x="650" y="235" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Bénévolat, ONG (Restos du cœur...)</text>

  <!-- Syndicats -->
  <rect x="50" y="180" width="200" height="40" fill="#f59e0b" rx="8" />
  <text x="150" y="205" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Engagement Social</text>
  <text x="150" y="235" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Syndicats (Droit du travail), Grève</text>
  
  <!-- Fiscal -->
  <rect x="80" y="90" width="200" height="40" fill="#0ea5e9" rx="8" />
  <text x="180" y="115" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Engagement Économique</text>
  <text x="180" y="145" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Payer l'impôt (Solidarité nationale)</text>

  <!-- Justice -->
  <rect x="300" y="320" width="200" height="40" fill="#64748b" rx="8" />
  <text x="400" y="345" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Engagement Judiciaire</text>
  <text x="400" y="375" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Juré d'assises, Témoin</text>

</svg>
