<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#1e293b" rx="20"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#f8fafc" font-weight="bold" text-anchor="middle">L'Effet de Serre</text>

  <!-- Earth surface -->
  <path d="M 0 350 Q 400 300 800 350 L 800 400 L 0 400 Z" fill="#166534" />
  
  <!-- Atmosphere -->
  <path d="M 0 200 Q 400 150 800 200" stroke="#0ea5e9" stroke-width="20" opacity="0.3" fill="none" />
  <text x="100" y="160" font-family="sans-serif" font-size="16" fill="#38bdf8" font-weight="bold">Atmosphère (Gaz à effet de serre)</text>
  <text x="100" y="180" font-family="sans-serif" font-size="12" fill="#bae6fd">CO2, Méthane, Vapeur d'eau...</text>

  <!-- Sun -->
  <circle cx="100" cy="80" r="40" fill="#eab308" />
  <path d="M 100 20 L 100 00 M 100 140 L 100 160 M 40 80 L 20 80 M 160 80 L 180 80 M 60 40 L 45 25 M 140 120 L 155 135 M 140 40 L 155 25 M 60 120 L 45 135" stroke="#eab308" stroke-width="4" />

  <!-- Solar radiation in -->
  <path d="M 140 110 L 280 300" stroke="#eab308" stroke-width="4" fill="none" />
  <polygon points="280,300 270,285 285,280" fill="#eab308" />
  <text x="240" y="240" font-family="sans-serif" font-size="14" fill="#eab308" font-weight="bold" transform="rotate(50, 240, 240)">Rayonnement solaire</text>

  <!-- Earth radiates heat -->
  <path d="M 330 310 L 380 230" stroke="#ef4444" stroke-width="4" stroke-dasharray="6 4" fill="none" />
  <polygon points="380,230 370,240 385,245" fill="#ef4444" />
  <text x="375" y="280" font-family="sans-serif" font-size="14" fill="#ef4444" font-weight="bold">La Terre chauffe (Infrarouges)</text>

  <!-- Heat trapped by atmosphere -->
  <path d="M 400 190 Q 450 150 500 230" stroke="#ef4444" stroke-width="5" fill="none" />
  <polygon points="500,230 495,215 510,220" fill="#ef4444" />
  
  <path d="M 450 180 Q 550 120 600 250" stroke="#ef4444" stroke-width="5" fill="none" />
  <polygon points="600,250 595,235 610,240" fill="#ef4444" />

  <!-- Some heat escapes -->
  <path d="M 520 180 L 560 80" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4" fill="none" />
  <polygon points="560,80 550,95 565,90" fill="#ef4444" />
  <text x="570" y="100" font-family="sans-serif" font-size="12" fill="#ef4444">Une partie s'échappe</text>

  <!-- Concept -->
  <rect x="520" y="280" width="250" height="80" fill="#1e293b" rx="8" opacity="0.9" />
  <text x="645" y="305" font-family="sans-serif" font-size="14" fill="#f8fafc" font-weight="bold" text-anchor="middle">Effet de Serre (= Couverture)</text>
  <text x="645" y="325" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Retient la chaleur, indispensable à la vie.</text>
  <text x="645" y="340" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Dangereux s'il est amplifié par l'humain.</text>

</svg>
