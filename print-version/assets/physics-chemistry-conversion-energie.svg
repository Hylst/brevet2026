<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .label { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #334155; font-weight: bold; }
      .energy-in { fill: #3b82f6; stroke: #2563eb; stroke-width: 2; }
      .converter { fill: #f59e0b; stroke: #d97706; stroke-width: 2; }
      .energy-out { fill: #22c55e; stroke: #16a34a; stroke-width: 2; }
      .energy-lost { fill: #ef4444; stroke: #dc2626; stroke-width: 2; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; }
      .arrow-head { fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Diagramme de Conversion d'Énergie</text>
  <text x="400" y="65" class="desc" text-anchor="middle" font-style="italic">Exemple : Une Éolienne</text>

  <!-- Energy In (Source) -->
  <rect x="50" y="150" width="180" height="60" class="energy-in" rx="8" />
  <text x="140" y="175" class="label" text-anchor="middle">Énergie Cinétique</text>
  <text x="140" y="195" font-family="Inter" font-size="12" fill="#eff6ff" text-anchor="middle">(Le Vent)</text>

  <!-- Arrow In -->
  <line x1="230" y1="180" x2="310" y2="180" class="arrow" marker-end="url(#arrow)" />

  <!-- Converter -->
  <circle cx="400" cy="180" r="70" class="converter" />
  <text x="400" y="175" class="label" text-anchor="middle">Convertisseur</text>
  <text x="400" y="195" font-family="Inter" font-size="12" fill="#fffbeb" text-anchor="middle">(Alternateur)</text>

  <!-- Arrow Out (Useful) -->
  <line x1="470" y1="180" x2="550" y2="180" class="arrow" marker-end="url(#arrow)" />

  <!-- Energy Out (Useful) -->
  <rect x="570" y="150" width="180" height="60" class="energy-out" rx="8" />
  <text x="660" y="175" class="label" text-anchor="middle">Énergie Électrique</text>
  <text x="660" y="195" font-family="Inter" font-size="12" fill="#f0fdf4" text-anchor="middle">(Énergie Utile)</text>

  <!-- Arrow Out (Lost) -->
  <path d="M 400 250 L 400 300 L 550 300" class="arrow" marker-end="url(#arrow)" />

  <!-- Energy Out (Lost) -->
  <rect x="570" y="270" width="180" height="60" class="energy-lost" rx="8" />
  <text x="660" y="295" class="label" text-anchor="middle">Énergie Thermique</text>
  <text x="660" y="315" font-family="Inter" font-size="12" fill="#fef2f2" text-anchor="middle">(Énergie Dissipée / Chaleur)</text>

  <!-- Conservation Equation -->
  <rect x="150" y="340" width="500" height="40" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8" />
  <text x="400" y="365" font-family="JetBrains Mono" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Énergie Entrante = Énergie Utile + Énergie Dissipée</text>

</svg>
