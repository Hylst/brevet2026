<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .center-node { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: bold; fill: #ffffff; }
      .branch-title { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; fill: #ffffff; }
      .branch-desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #1e293b; font-weight: bold; }
      .example { font-family: 'Inter', sans-serif; font-size: 12px; font-style: italic; fill: #475569; }
      
      .line { stroke: #94a3b8; stroke-width: 4; fill: none; }
      
      .center-circle { fill: #0f172a; stroke: #cbd5e1; stroke-width: 4; }
      .can-box { fill: #3b82f6; rx: 8; }
      .must-box { fill: #ef4444; rx: 8; }
      .should-box { fill: #22c55e; rx: 8; }
      .may-box { fill: #f59e0b; rx: 8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Carte Mentale : Les Modaux</text>

  <!-- Connecting Lines -->
  <path d="M 400 200 L 200 120" class="line" /> <!-- Top Left -->
  <path d="M 400 200 L 600 120" class="line" /> <!-- Top Right -->
  <path d="M 400 200 L 200 280" class="line" /> <!-- Bottom Left -->
  <path d="M 400 200 L 600 280" class="line" /> <!-- Bottom Right -->

  <!-- Central Node -->
  <circle cx="400" cy="200" r="50" class="center-circle" />
  <text x="400" y="195" class="center-node" text-anchor="middle">LES</text>
  <text x="400" y="220" class="center-node" text-anchor="middle">MODAUX</text>

  <!-- Top Left: CAN / COULD -->
  <rect x="80" y="80" width="160" height="40" class="can-box" />
  <text x="160" y="105" class="branch-title" text-anchor="middle">CAN / COULD</text>
  <text x="160" y="140" class="branch-desc" text-anchor="middle">Capacité / Permission</text>
  <text x="160" y="160" class="example" text-anchor="middle">"I can swim"</text>
  <text x="160" y="175" class="example" text-anchor="middle">"Can I go out?"</text>

  <!-- Top Right: MUST / MUSTN'T -->
  <rect x="560" y="80" width="160" height="40" class="must-box" />
  <text x="640" y="105" class="branch-title" text-anchor="middle">MUST / MUSTN'T</text>
  <text x="640" y="140" class="branch-desc" text-anchor="middle">Obligation / Interdiction</text>
  <text x="640" y="160" class="example" text-anchor="middle">"You must listen"</text>
  <text x="640" y="175" class="example" text-anchor="middle">"You mustn't smoke"</text>

  <!-- Bottom Left: SHOULD -->
  <rect x="80" y="260" width="160" height="40" class="should-box" />
  <text x="160" y="285" class="branch-title" text-anchor="middle">SHOULD</text>
  <text x="160" y="320" class="branch-desc" text-anchor="middle">Conseil</text>
  <text x="160" y="340" class="example" text-anchor="middle">"You should sleep"</text>
  <text x="160" y="355" class="example" text-anchor="middle">"You shouldn't eat that"</text>

  <!-- Bottom Right: MAY / MIGHT -->
  <rect x="560" y="260" width="160" height="40" class="may-box" />
  <text x="640" y="285" class="branch-title" text-anchor="middle">MAY / MIGHT</text>
  <text x="640" y="320" class="branch-desc" text-anchor="middle">Probabilité</text>
  <text x="640" y="340" class="example" text-anchor="middle">"It may rain (50%)"</text>
  <text x="640" y="355" class="example" text-anchor="middle">"He might come (20%)"</text>

  <!-- Golden Rule Box -->
  <rect x="250" y="360" width="300" height="30" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="4" />
  <text x="400" y="380" font-family="Inter" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">RÈGLE D'OR : Modal + Base Verbale (sans "to")</text>

</svg>
