<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .text { font-family: 'Inter', sans-serif; font-size: 16px; fill: #334155; }
      .math { font-family: 'JetBrains Mono', monospace; font-size: 22px; fill: #0f172a; font-weight: bold; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .highlight { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Fiche Mémo : Trigonométrie</text>

  <!-- SOH CAH TOA Box -->
  <rect x="100" y="80" width="600" height="100" class="highlight" />
  <text x="400" y="120" class="title" text-anchor="middle" font-size="28" fill="#b91c1c">SOH CAH TOA</text>
  <text x="400" y="150" class="text" text-anchor="middle" fill="#7f1d1d">Le moyen mnémotechnique indispensable !</text>

  <!-- SOH -->
  <rect x="40" y="210" width="220" height="150" class="box" />
  <text x="150" y="250" class="title" text-anchor="middle" font-size="24" fill="#2563eb">SOH</text>
  <text x="150" y="290" class="math" text-anchor="middle">Sinus =</text>
  <text x="150" y="320" class="math" text-anchor="middle">Opposé / Hyp.</text>

  <!-- CAH -->
  <rect x="290" y="210" width="220" height="150" class="box" />
  <text x="400" y="250" class="title" text-anchor="middle" font-size="24" fill="#16a34a">CAH</text>
  <text x="400" y="290" class="math" text-anchor="middle">Cosinus =</text>
  <text x="400" y="320" class="math" text-anchor="middle">Adjacent / Hyp.</text>

  <!-- TOA -->
  <rect x="540" y="210" width="220" height="150" class="box" />
  <text x="650" y="250" class="title" text-anchor="middle" font-size="24" fill="#d97706">TOA</text>
  <text x="650" y="290" class="math" text-anchor="middle">Tangente =</text>
  <text x="650" y="320" class="math" text-anchor="middle">Opposé / Adj.</text>
</svg>
