<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; fill: #334155; }
      .desc { font-family: 'Inter', sans-serif; font-size: 12px; fill: #64748b; }
      .neuron { fill: #fef08a; stroke: #ca8a04; stroke-width: 2; }
      .axon { stroke: #ca8a04; stroke-width: 6; fill: none; }
      .myelin { fill: #bfdbfe; stroke: #3b82f6; stroke-width: 2; rx: 4; }
      .synapse-zoom { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 4,4; }
      .neurotransmitter { fill: #ef4444; }
      .receptor { fill: #3b82f6; }
      .electric { stroke: #eab308; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrow-elec" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#eab308" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Le Neurone et la Synapse</text>

  <!-- NEURON 1 -->
  <!-- Cell body -->
  <circle cx="150" cy="150" r="40" class="neuron" />
  <circle cx="150" cy="150" r="10" fill="#a16207" /> <!-- Nucleus -->
  <!-- Dendrites -->
  <path d="M 120 120 L 90 90 M 180 120 L 210 90 M 110 150 L 70 150 M 120 180 L 90 210 M 180 180 L 210 210" stroke="#ca8a04" stroke-width="4" stroke-linecap="round" />
  <!-- Axon -->
  <path d="M 190 150 L 400 150" class="axon" />
  <!-- Myelin sheaths -->
  <rect x="210" y="142" width="40" height="16" class="myelin" />
  <rect x="260" y="142" width="40" height="16" class="myelin" />
  <rect x="310" y="142" width="40" height="16" class="myelin" />
  <rect x="360" y="142" width="40" height="16" class="myelin" />
  <!-- Axon terminals -->
  <path d="M 400 150 L 430 120 M 400 150 L 430 180" stroke="#ca8a04" stroke-width="4" stroke-linecap="round" />
  <circle cx="430" cy="120" r="6" class="neuron" />
  <circle cx="430" cy="180" r="6" class="neuron" />

  <!-- NEURON 2 (Partial) -->
  <path d="M 450 120 L 480 120 M 450 180 L 480 180" stroke="#ca8a04" stroke-width="4" stroke-linecap="round" />
  <circle cx="500" cy="120" r="20" class="neuron" />
  <circle cx="500" cy="180" r="20" class="neuron" />

  <!-- Electric Signal Arrow -->
  <path d="M 150 110 L 350 110" class="electric" marker-end="url(#arrow-elec)" />
  <text x="250" y="100" class="label" fill="#ca8a04" text-anchor="middle">Message Électrique</text>

  <!-- Labels Neuron -->
  <text x="150" y="210" class="label" text-anchor="middle">Corps cellulaire</text>
  <text x="300" y="180" class="label" text-anchor="middle">Axone</text>

  <!-- SYNAPSE ZOOM AREA -->
  <circle cx="440" cy="120" r="30" class="synapse-zoom" fill="none" />
  <path d="M 460 140 L 550 220" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M 470 110 L 750 220" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />

  <!-- ZOOMED SYNAPSE -->
  <rect x="500" y="220" width="280" height="160" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8" />
  <text x="640" y="240" class="label" text-anchor="middle">ZOOM : La Synapse</text>

  <!-- Pre-synaptic terminal -->
  <path d="M 580 250 Q 640 300 700 250" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
  <!-- Vesicles -->
  <circle cx="610" cy="265" r="8" fill="#ffffff" stroke="#ca8a04" stroke-width="2" />
  <circle cx="640" cy="275" r="8" fill="#ffffff" stroke="#ca8a04" stroke-width="2" />
  <circle cx="670" cy="265" r="8" fill="#ffffff" stroke="#ca8a04" stroke-width="2" />
  
  <!-- Neurotransmitters (Red dots) -->
  <circle cx="610" cy="265" r="3" class="neurotransmitter" />
  <circle cx="640" cy="275" r="3" class="neurotransmitter" />
  <circle cx="670" cy="265" r="3" class="neurotransmitter" />
  <!-- Released Neurotransmitters -->
  <circle cx="620" cy="300" r="3" class="neurotransmitter" />
  <circle cx="640" cy="310" r="3" class="neurotransmitter" />
  <circle cx="660" cy="305" r="3" class="neurotransmitter" />

  <!-- Post-synaptic membrane -->
  <path d="M 580 350 Q 640 320 700 350" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
  
  <!-- Receptors -->
  <path d="M 615 332 L 625 332 L 620 340 Z" class="receptor" />
  <path d="M 635 327 L 645 327 L 640 335 Z" class="receptor" />
  <path d="M 655 330 L 665 330 L 660 338 Z" class="receptor" />

  <!-- Labels Zoom -->
  <text x="520" y="260" class="desc">Neurone 1</text>
  <text x="520" y="360" class="desc">Neurone 2</text>
  <text x="710" y="310" class="desc" fill="#ef4444">Message Chimique</text>
  <text x="710" y="325" class="desc" fill="#ef4444">(Neurotransmetteurs)</text>

</svg>
