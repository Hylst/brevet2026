<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .label { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; fill: #334155; }
      .desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #64748b; }
      .orbit { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 5,5; }
      .proton { fill: #ef4444; }
      .neutron { fill: #94a3b8; }
      .electron { fill: #3b82f6; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Modèle de l'Atome</text>

  <!-- Orbits -->
  <ellipse cx="400" cy="220" rx="150" ry="60" class="orbit" transform="rotate(30 400 220)" />
  <ellipse cx="400" cy="220" rx="150" ry="60" class="orbit" transform="rotate(-30 400 220)" />
  <ellipse cx="400" cy="220" rx="150" ry="60" class="orbit" transform="rotate(90 400 220)" />

  <!-- Nucleus (Protons & Neutrons) -->
  <circle cx="390" cy="215" r="12" class="proton" />
  <text x="390" y="220" fill="white" font-size="12" text-anchor="middle" font-weight="bold">+</text>
  
  <circle cx="410" cy="215" r="12" class="neutron" />
  
  <circle cx="400" cy="230" r="12" class="proton" />
  <text x="400" y="235" fill="white" font-size="12" text-anchor="middle" font-weight="bold">+</text>
  
  <circle cx="395" cy="205" r="12" class="neutron" />
  <circle cx="410" cy="225" r="12" class="neutron" />

  <!-- Electrons -->
  <circle cx="270" cy="145" r="8" class="electron" />
  <text x="270" y="149" fill="white" font-size="12" text-anchor="middle" font-weight="bold">-</text>

  <circle cx="530" cy="295" r="8" class="electron" />
  <text x="530" y="299" fill="white" font-size="12" text-anchor="middle" font-weight="bold">-</text>

  <circle cx="400" cy="70" r="8" class="electron" />
  <text x="400" y="74" fill="white" font-size="12" text-anchor="middle" font-weight="bold">-</text>

  <!-- Labels -->
  <line x1="420" y1="215" x2="550" y2="150" stroke="#64748b" stroke-width="2" />
  <text x="560" y="145" class="label" fill="#ef4444">Noyau</text>
  <text x="560" y="165" class="desc">Protons (+) et Neutrons (0)</text>
  <text x="560" y="185" class="desc">Concentre presque toute la masse.</text>

  <line x1="270" y1="145" x2="180" y2="100" stroke="#64748b" stroke-width="2" />
  <text x="170" y="95" class="label" fill="#3b82f6" text-anchor="end">Électrons</text>
  <text x="170" y="115" class="desc" text-anchor="end">Charge négative (-)</text>
  <text x="170" y="135" class="desc" text-anchor="end">Gravitent autour du noyau.</text>

  <!-- Info Box -->
  <rect x="50" y="320" width="700" height="60" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8" />
  <text x="400" y="345" class="label" text-anchor="middle">Règle d'or : Un atome est électriquement neutre.</text>
  <text x="400" y="365" class="desc" text-anchor="middle">Il y a toujours autant de protons (+) dans le noyau que d'électrons (-) autour.</text>

</svg>
