<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .block-text { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
      .desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #475569; }
      .event-block { fill: #f59e0b; stroke: #d97706; stroke-width: 2; }
      .control-block { fill: #f59e0b; stroke: #d97706; stroke-width: 2; }
      .motion-block { fill: #3b82f6; stroke: #2563eb; stroke-width: 2; }
      .var-block { fill: #f97316; stroke: #ea580c; stroke-width: 2; }
      .operator-block { fill: #22c55e; stroke: #16a34a; stroke-width: 2; }
      .input-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 10; }
      .hex-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Les Blocs de Programmation (Type Scratch)</text>

  <!-- SECTION 1: Événements & Variables -->
  <g transform="translate(50, 80)">
    <!-- Event Block (Hat) -->
    <path d="M 0 20 Q 20 -10 40 20 L 200 20 L 200 50 L 30 50 L 25 55 L 15 55 L 10 50 L 0 50 Z" class="event-block" />
    <text x="100" y="40" class="block-text" text-anchor="middle">Quand 🏁 est cliqué</text>
    <text x="220" y="35" class="desc">Déclencheur du programme</text>

    <!-- Variable Block -->
    <path d="M 0 70 L 150 70 L 150 100 L 30 100 L 25 105 L 15 105 L 10 100 L 0 100 Z" class="var-block" />
    <text x="50" y="90" class="block-text">mettre</text>
    <rect x="100" y="75" width="40" height="20" class="input-box" />
    <text x="120" y="90" font-family="Inter" font-size="12" fill="#0f172a" text-anchor="middle">0</text>
    <text x="220" y="90" class="desc">Initialisation d'une variable</text>
  </g>

  <!-- SECTION 2: La Boucle (Répéter) -->
  <g transform="translate(50, 220)">
    <!-- Loop Block (C-shape) -->
    <path d="M 0 0 L 150 0 L 150 30 L 40 30 L 40 70 L 150 70 L 150 100 L 30 100 L 25 105 L 15 105 L 10 100 L 0 100 Z" class="control-block" />
    <text x="45" y="20" class="block-text">répéter</text>
    <rect x="100" y="5" width="30" height="20" class="input-box" />
    <text x="115" y="20" font-family="Inter" font-size="12" fill="#0f172a" text-anchor="middle">10</text>
    <text x="140" y="20" class="block-text">fois</text>

    <!-- Inside Loop: Motion -->
    <path d="M 15 30 L 130 30 L 130 60 L 45 60 L 40 65 L 30 65 L 25 60 L 15 60 Z" class="motion-block" />
    <text x="55" y="50" class="block-text">avancer de</text>
    <rect x="135" y="35" width="30" height="20" class="input-box" />
    <text x="150" y="50" font-family="Inter" font-size="12" fill="#0f172a" text-anchor="middle">10</text>

    <text x="220" y="50" class="desc">Boucle : Répète les instructions à l'intérieur</text>
  </g>

  <!-- SECTION 3: La Condition (Si... Alors) -->
  <g transform="translate(450, 80)">
    <!-- If Block (C-shape) -->
    <path d="M 0 0 L 250 0 L 250 30 L 40 30 L 40 70 L 250 70 L 250 100 L 30 100 L 25 105 L 15 105 L 10 100 L 0 100 Z" class="control-block" />
    <text x="20" y="20" class="block-text">si</text>
    
    <!-- Hexagon Operator (Condition) -->
    <polygon points="50,15 60,5 140,5 150,15 140,25 60,25" class="operator-block" />
    <text x="100" y="20" class="block-text" text-anchor="middle">score &gt; 50</text>
    
    <text x="170" y="20" class="block-text">alors</text>

    <!-- Inside If: Motion -->
    <path d="M 15 30 L 180 30 L 180 60 L 45 60 L 40 65 L 30 65 L 25 60 L 15 60 Z" class="motion-block" />
    <text x="95" y="50" class="block-text" text-anchor="middle">dire "Gagné !"</text>

    <text x="0" y="130" class="desc">Condition : Exécute l'action UNIQUEMENT</text>
    <text x="0" y="150" class="desc">si le test logique (hexagone vert) est VRAI.</text>
  </g>

</svg>
