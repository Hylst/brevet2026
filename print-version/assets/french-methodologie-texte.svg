<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .step-title { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; fill: #ffffff; }
      .step-desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #334155; }
      .quote { font-family: 'Inter', sans-serif; font-size: 14px; font-style: italic; fill: #0f172a; font-weight: bold; }
      .box-1 { fill: #3b82f6; rx: 8; }
      .box-2 { fill: #f59e0b; rx: 8; }
      .box-3 { fill: #22c55e; rx: 8; }
      .arrow { stroke: #94a3b8; stroke-width: 4; fill: none; stroke-linecap: round; }
      .arrow-head { fill: #94a3b8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Méthode A.C.E. : Répondre à une question sur un texte</text>
  <text x="400" y="65" font-family="Inter" font-size="14" fill="#64748b" text-anchor="middle" font-style="italic">La règle d'or du Brevet pour justifier ses réponses.</text>

  <!-- STEP 1: Affirmer -->
  <rect x="50" y="120" width="200" height="40" class="box-1" />
  <text x="150" y="145" class="step-title" text-anchor="middle">1. AFFIRMER</text>
  
  <rect x="50" y="160" width="200" height="100" fill="#f8fafc" stroke="#3b82f6" stroke-width="2" rx="8" />
  <text x="150" y="190" class="step-desc" text-anchor="middle">Je réponds directement</text>
  <text x="150" y="210" class="step-desc" text-anchor="middle">à la question posée.</text>
  <text x="150" y="240" class="quote" text-anchor="middle" fill="#3b82f6">"Le narrateur est triste."</text>

  <!-- Arrow 1 to 2 -->
  <path d="M 260 170 L 300 170" class="arrow" marker-end="url(#arrow)" />

  <!-- STEP 2: Citer -->
  <rect x="300" y="120" width="200" height="40" class="box-2" />
  <text x="400" y="145" class="step-title" text-anchor="middle">2. CITER</text>
  
  <rect x="300" y="160" width="200" height="100" fill="#f8fafc" stroke="#f59e0b" stroke-width="2" rx="8" />
  <text x="400" y="190" class="step-desc" text-anchor="middle">Je prouve avec le texte.</text>
  <text x="400" y="210" class="step-desc" text-anchor="middle">Guillemets + Ligne !</text>
  <text x="400" y="240" class="quote" text-anchor="middle" fill="#d97706">"Il pleure" (l. 4).</text>

  <!-- Arrow 2 to 3 -->
  <path d="M 510 170 L 550 170" class="arrow" marker-end="url(#arrow)" />

  <!-- STEP 3: Expliquer -->
  <rect x="550" y="120" width="200" height="40" class="box-3" />
  <text x="650" y="145" class="step-title" text-anchor="middle">3. EXPLIQUER</text>
  
  <rect x="550" y="160" width="200" height="100" fill="#f8fafc" stroke="#22c55e" stroke-width="2" rx="8" />
  <text x="650" y="190" class="step-desc" text-anchor="middle">J'analyse la citation</text>
  <text x="650" y="210" class="step-desc" text-anchor="middle">(figure de style, lexique).</text>
  <text x="650" y="240" class="quote" text-anchor="middle" fill="#16a34a">"Le verbe montre son chagrin."</text>

  <!-- Full Example Box -->
  <rect x="50" y="290" width="700" height="80" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="8" />
  <text x="70" y="315" font-family="Inter" font-size="14" font-weight="bold" fill="#0f172a">Exemple de rédaction parfaite :</text>
  <text x="70" y="340" font-family="Inter" font-size="14" fill="#334155">
    <tspan fill="#2563eb" font-weight="bold">Le narrateur est triste.</tspan> En effet, il écrit : 
    <tspan fill="#d97706" font-weight="bold">« il pleure à chaudes larmes » (l. 4)</tspan>. 
    <tspan fill="#16a34a" font-weight="bold">Cette hyperbole souligne l'intensité de son chagrin.</tspan>
  </text>

</svg>
