<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; fill: #334155; }
      .desc { font-family: 'Inter', sans-serif; font-size: 12px; fill: #64748b; }
      .chromo { fill: #3b82f6; stroke: #1e40af; stroke-width: 1; rx: 4; }
      .chromo-y { fill: #ef4444; stroke: #991b1b; stroke-width: 1; rx: 4; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Caryotype Humain (Homme : 46, XY)</text>

  <!-- Chromosomes Grid -->
  <g transform="translate(50, 80)">
    <!-- Autosomes (Pairs 1 to 22) - Simplified representation -->
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="10" height="40" class="chromo" />
      <rect x="15" y="0" width="10" height="40" class="chromo" />
      <text x="12" y="55" class="label" text-anchor="middle">1</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="0" y="2" width="10" height="38" class="chromo" />
      <rect x="15" y="2" width="10" height="38" class="chromo" />
      <text x="12" y="55" class="label" text-anchor="middle">2</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="4" width="10" height="36" class="chromo" />
      <rect x="15" y="4" width="10" height="36" class="chromo" />
      <text x="12" y="55" class="label" text-anchor="middle">3</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="0" y="6" width="10" height="34" class="chromo" />
      <rect x="15" y="6" width="10" height="34" class="chromo" />
      <text x="12" y="55" class="label" text-anchor="middle">4</text>
    </g>
    <g transform="translate(240, 0)">
      <rect x="0" y="8" width="10" height="32" class="chromo" />
      <rect x="15" y="8" width="10" height="32" class="chromo" />
      <text x="12" y="55" class="label" text-anchor="middle">5</text>
    </g>
    <g transform="translate(300, 0)">
      <rect x="0" y="10" width="10" height="30" class="chromo" />
      <rect x="15" y="10" width="10" height="30" class="chromo" />
      <text x="12" y="55" class="label" text-anchor="middle">6</text>
    </g>
    <g transform="translate(360, 0)">
      <rect x="0" y="12" width="10" height="28" class="chromo" />
      <rect x="15" y="12" width="10" height="28" class="chromo" />
      <text x="12" y="55" class="label" text-anchor="middle">7</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="10" height="26" class="chromo" />
      <rect x="15" y="0" width="10" height="26" class="chromo" />
      <text x="12" y="40" class="label" text-anchor="middle">8</text>
    </g>
    <g transform="translate(60, 80)">
      <rect x="0" y="2" width="10" height="24" class="chromo" />
      <rect x="15" y="2" width="10" height="24" class="chromo" />
      <text x="12" y="40" class="label" text-anchor="middle">9</text>
    </g>
    <g transform="translate(120, 80)">
      <rect x="0" y="4" width="10" height="22" class="chromo" />
      <rect x="15" y="4" width="10" height="22" class="chromo" />
      <text x="12" y="40" class="label" text-anchor="middle">10</text>
    </g>
    <g transform="translate(180, 80)">
      <rect x="0" y="6" width="10" height="20" class="chromo" />
      <rect x="15" y="6" width="10" height="20" class="chromo" />
      <text x="12" y="40" class="label" text-anchor="middle">11</text>
    </g>
    <g transform="translate(240, 80)">
      <rect x="0" y="8" width="10" height="18" class="chromo" />
      <rect x="15" y="8" width="10" height="18" class="chromo" />
      <text x="12" y="40" class="label" text-anchor="middle">12</text>
    </g>
    <g transform="translate(300, 80)">
      <rect x="0" y="10" width="10" height="16" class="chromo" />
      <rect x="15" y="10" width="10" height="16" class="chromo" />
      <text x="12" y="40" class="label" text-anchor="middle">13</text>
    </g>
    <g transform="translate(360, 80)">
      <rect x="0" y="12" width="10" height="14" class="chromo" />
      <rect x="15" y="12" width="10" height="14" class="chromo" />
      <text x="12" y="40" class="label" text-anchor="middle">14</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="10" height="14" class="chromo" />
      <rect x="15" y="0" width="10" height="14" class="chromo" />
      <text x="12" y="30" class="label" text-anchor="middle">15</text>
    </g>
    <g transform="translate(60, 150)">
      <rect x="0" y="2" width="10" height="12" class="chromo" />
      <rect x="15" y="2" width="10" height="12" class="chromo" />
      <text x="12" y="30" class="label" text-anchor="middle">16</text>
    </g>
    <g transform="translate(120, 150)">
      <rect x="0" y="4" width="10" height="10" class="chromo" />
      <rect x="15" y="4" width="10" height="10" class="chromo" />
      <text x="12" y="30" class="label" text-anchor="middle">17</text>
    </g>
    <g transform="translate(180, 150)">
      <rect x="0" y="6" width="10" height="8" class="chromo" />
      <rect x="15" y="6" width="10" height="8" class="chromo" />
      <text x="12" y="30" class="label" text-anchor="middle">18</text>
    </g>
    <g transform="translate(240, 150)">
      <rect x="0" y="6" width="10" height="8" class="chromo" />
      <rect x="15" y="6" width="10" height="8" class="chromo" />
      <text x="12" y="30" class="label" text-anchor="middle">19</text>
    </g>
    <g transform="translate(300, 150)">
      <rect x="0" y="8" width="10" height="6" class="chromo" />
      <rect x="15" y="8" width="10" height="6" class="chromo" />
      <text x="12" y="30" class="label" text-anchor="middle">20</text>
    </g>
    <g transform="translate(360, 150)">
      <rect x="0" y="8" width="10" height="6" class="chromo" />
      <rect x="15" y="8" width="10" height="6" class="chromo" />
      <text x="12" y="30" class="label" text-anchor="middle">21</text>
    </g>
    <g transform="translate(420, 150)">
      <rect x="0" y="8" width="10" height="6" class="chromo" />
      <rect x="15" y="8" width="10" height="6" class="chromo" />
      <text x="12" y="30" class="label" text-anchor="middle">22</text>
    </g>

    <!-- Sex Chromosomes (Pair 23) -->
    <g transform="translate(550, 100)">
      <!-- X Chromosome -->
      <rect x="0" y="0" width="12" height="35" class="chromo" />
      <!-- Y Chromosome (much smaller) -->
      <rect x="25" y="20" width="10" height="15" class="chromo-y" />
      <text x="18" y="55" class="label" text-anchor="middle" fill="#dc2626">23 (Sexe)</text>
      <text x="6" y="75" class="label" text-anchor="middle">X</text>
      <text x="30" y="75" class="label" text-anchor="middle" fill="#dc2626">Y</text>
    </g>
  </g>

  <!-- Info Box -->
  <rect x="500" y="250" width="260" height="100" class="box" />
  <text x="630" y="280" class="label" text-anchor="middle">Paires 1 à 22 : Autosomes</text>
  <text x="630" y="300" class="label" text-anchor="middle" fill="#dc2626">Paire 23 : Chromosomes sexuels</text>
  <text x="630" y="320" class="desc" text-anchor="middle">XX = Femme</text>
  <text x="630" y="335" class="desc" text-anchor="middle">XY = Homme</text>

</svg>
