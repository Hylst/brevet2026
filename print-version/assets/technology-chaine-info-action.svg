<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; fill: #1e293b; }
      .box-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .box-text { font-family: 'Inter', sans-serif; font-size: 12px; fill: #1e293b; }
      .info-box { fill: #3b82f6; rx: 8; }
      .action-box { fill: #ef4444; rx: 8; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; }
      .arrow-head { fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Chaîne d'Information -->
  <text x="400" y="40" class="title" text-anchor="middle" fill="#2563eb">Chaîne d'Information</text>
  
  <rect x="100" y="60" width="150" height="40" class="info-box" />
  <text x="175" y="85" class="box-title" text-anchor="middle">ACQUÉRIR</text>
  <text x="175" y="115" class="box-text" text-anchor="middle">Capteurs, Boutons</text>

  <line x1="250" y1="80" x2="320" y2="80" class="arrow" marker-end="url(#arrowhead)" />

  <rect x="325" y="60" width="150" height="40" class="info-box" />
  <text x="400" y="85" class="box-title" text-anchor="middle">TRAITER</text>
  <text x="400" y="115" class="box-text" text-anchor="middle">Carte programmable</text>

  <line x1="475" y1="80" x2="545" y2="80" class="arrow" marker-end="url(#arrowhead)" />

  <rect x="550" y="60" width="150" height="40" class="info-box" />
  <text x="625" y="85" class="box-title" text-anchor="middle">COMMUNIQUER</text>
  <text x="625" y="115" class="box-text" text-anchor="middle">Écran, LED, Câbles</text>

  <!-- Ordres Arrow -->
  <line x1="625" y1="130" x2="625" y2="210" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />
  <text x="635" y="170" class="box-text" font-style="italic">Ordres</text>

  <!-- Chaîne d'Action/Énergie -->
  <text x="400" y="200" class="title" text-anchor="middle" fill="#dc2626">Chaîne d'Action (Énergie)</text>

  <rect x="50" y="220" width="150" height="40" class="action-box" />
  <text x="125" y="245" class="box-title" text-anchor="middle">ALIMENTER</text>
  <text x="125" y="275" class="box-text" text-anchor="middle">Pile, Prise, Solaire</text>

  <line x1="200" y1="240" x2="245" y2="240" class="arrow" marker-end="url(#arrowhead)" />

  <rect x="250" y="220" width="150" height="40" class="action-box" />
  <text x="325" y="245" class="box-title" text-anchor="middle">DISTRIBUER</text>
  <text x="325" y="275" class="box-text" text-anchor="middle">Relais, Interrupteur</text>

  <line x1="400" y1="240" x2="445" y2="240" class="arrow" marker-end="url(#arrowhead)" />

  <rect x="450" y="220" width="150" height="40" class="action-box" />
  <text x="525" y="245" class="box-title" text-anchor="middle">CONVERTIR</text>
  <text x="525" y="275" class="box-text" text-anchor="middle">Moteur (Actionneur)</text>

  <line x1="600" y1="240" x2="645" y2="240" class="arrow" marker-end="url(#arrowhead)" />

  <rect x="650" y="220" width="120" height="40" class="action-box" />
  <text x="710" y="245" class="box-title" text-anchor="middle">TRANSMETTRE</text>
  <text x="710" y="275" class="box-text" text-anchor="middle">Engrenages</text>

  <line x1="770" y1="240" x2="800" y2="240" class="arrow" marker-end="url(#arrowhead)" />
  <text x="785" y="230" class="box-text" font-weight="bold">ACTION</text>

</svg>
