<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .label { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .desc { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: bold; fill: #1e293b; }
      .map-bg { fill: #e2e8f0; }
      .west-bloc { fill: #3b82f6; opacity: 0.8; }
      .east-bloc { fill: #ef4444; opacity: 0.8; }
      .iron-curtain { stroke: #0f172a; stroke-width: 4; stroke-dasharray: 8,4; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Le Monde Bipolaire pendant la Guerre Froide</text>

  <!-- Stylized Map Background (Continents) -->
  <!-- North America -->
  <path d="M 50 100 Q 150 80 200 150 Q 150 250 100 200 Z" class="west-bloc" />
  <!-- Western Europe -->
  <path d="M 350 120 Q 400 100 420 180 Q 380 200 350 160 Z" class="west-bloc" />
  
  <!-- USSR / Eastern Europe / Asia -->
  <path d="M 420 100 Q 600 50 750 120 Q 700 250 500 200 Q 450 180 420 180 Z" class="east-bloc" />

  <!-- Iron Curtain Line -->
  <path d="M 420 100 L 420 180" class="iron-curtain" />
  <text x="420" y="210" class="desc" text-anchor="middle">Rideau de Fer</text>

  <!-- Labels -->
  <text x="125" y="150" class="label" text-anchor="middle">ÉTATS-UNIS</text>
  <text x="125" y="170" class="label" text-anchor="middle" font-size="12">(OTAN)</text>

  <text x="580" y="140" class="label" text-anchor="middle">U.R.S.S.</text>
  <text x="580" y="160" class="label" text-anchor="middle" font-size="12">(Pacte de Varsovie)</text>

  <!-- Legend -->
  <rect x="50" y="280" width="700" height="100" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8" />
  
  <!-- West Legend -->
  <rect x="80" y="300" width="20" height="20" class="west-bloc" />
  <text x="110" y="315" class="desc">BLOC DE L'OUEST</text>
  <text x="110" y="335" font-family="Inter" font-size="12" fill="#475569">Idéologie : Capitalisme, Démocratie</text>
  <text x="110" y="355" font-family="Inter" font-size="12" fill="#475569">Leader : États-Unis</text>

  <!-- East Legend -->
  <rect x="450" y="300" width="20" height="20" class="east-bloc" />
  <text x="480" y="315" class="desc">BLOC DE L'EST</text>
  <text x="480" y="335" font-family="Inter" font-size="12" fill="#475569">Idéologie : Communisme, Dictature</text>
  <text x="480" y="355" font-family="Inter" font-size="12" fill="#475569">Leader : U.R.S.S.</text>

  <!-- Flashpoints -->
  <circle cx="390" cy="140" r="6" fill="#f59e0b" stroke="#fff" stroke-width="2" />
  <text x="390" y="130" font-family="Inter" font-size="10" font-weight="bold" fill="#b45309" text-anchor="middle">Berlin</text>

  <circle cx="180" cy="220" r="6" fill="#f59e0b" stroke="#fff" stroke-width="2" />
  <text x="180" y="240" font-family="Inter" font-size="10" font-weight="bold" fill="#b45309" text-anchor="middle">Cuba</text>

</svg>
