<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; }
      .date { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; fill: #dc2626; }
      .event { font-family: 'Inter', sans-serif; font-size: 14px; fill: #334155; }
      .line { stroke: #94a3b8; stroke-width: 4; }
      .tick { stroke: #94a3b8; stroke-width: 2; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 4; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">Frise Chronologique : Les Guerres Mondiales</text>

  <!-- Main Timeline -->
  <line x1="50" y1="200" x2="750" y2="200" class="line" />

  <!-- 1GM Section -->
  <rect x="100" y="190" width="150" height="20" fill="#fca5a5" opacity="0.5" />
  <text x="175" y="180" class="date" text-anchor="middle">1914 - 1918</text>
  <text x="175" y="230" class="event" text-anchor="middle">Première Guerre</text>
  <text x="175" y="250" class="event" text-anchor="middle">Mondiale</text>
  
  <line x1="100" y1="190" x2="100" y2="210" class="tick" />
  <line x1="250" y1="190" x2="250" y2="210" class="tick" />

  <!-- Entre-deux-guerres -->
  <text x="400" y="180" class="date" text-anchor="middle">Années 1930</text>
  <text x="400" y="230" class="event" text-anchor="middle">Régimes Totalitaires</text>
  <text x="400" y="250" class="event" text-anchor="middle">(Hitler, Staline)</text>

  <!-- 2GM Section -->
  <rect x="550" y="190" width="150" height="20" fill="#fca5a5" opacity="0.5" />
  <text x="625" y="180" class="date" text-anchor="middle">1939 - 1945</text>
  <text x="625" y="230" class="event" text-anchor="middle">Seconde Guerre</text>
  <text x="625" y="250" class="event" text-anchor="middle">Mondiale</text>

  <line x1="550" y1="190" x2="550" y2="210" class="tick" />
  <line x1="700" y1="190" x2="700" y2="210" class="tick" />

  <!-- Key Events (Top) -->
  <line x1="175" y1="150" x2="175" y2="200" class="tick" stroke-dasharray="4" />
  <rect x="125" y="110" width="100" height="40" class="box" />
  <text x="175" y="130" class="event" text-anchor="middle" font-size="12">1916</text>
  <text x="175" y="145" class="event" text-anchor="middle" font-size="12">Bataille de Verdun</text>

  <line x1="625" y1="150" x2="625" y2="200" class="tick" stroke-dasharray="4" />
  <rect x="575" y="110" width="100" height="40" class="box" />
  <text x="625" y="130" class="event" text-anchor="middle" font-size="12">1940</text>
  <text x="625" y="145" class="event" text-anchor="middle" font-size="12">Appel du 18 Juin</text>

</svg>
